<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico · PS</title>
<style>
  html,body{margin:0;background:#0e0608;color:#e8e8e8;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;line-height:1.5;}
  #top{position:sticky;top:0;background:#160b0d;padding:12px 14px;border-bottom:1px solid #3a2228;}
  h1{font-size:15px;margin:0 0 4px;color:#C9A84C;}
  .sub{font-size:11px;color:#9a8a8e;}
  #log{padding:10px 14px;white-space:pre-wrap;word-break:break-word;}
  .ok{color:#6ee7a8;}
  .fail{color:#fca5a5;font-weight:700;}
  .warn{color:#fbbf24;}
  .step{color:#cbd5e1;}
  .dim{color:#7c6f72;}
  #verdict{padding:12px 14px;margin:10px;border-radius:10px;font-size:14px;font-weight:700;display:none;}
  button{margin:8px 14px;padding:10px 18px;background:#7B2030;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;}
</style>
</head>
<body>
<div id="top">
  <h1>🔬 Diagnóstico de carga — PS</h1>
  <div class="sub">Hazle <b>Ctrl+Shift+R</b> para reproducir el cuelgue. La última línea que aparezca = donde se congela.</div>
</div>
<button onclick="location.reload()">↻ Recargar</button>
<button onclick="location.href='diag.html?hard='+Date.now()">↻ Forzar (bypass caché)</button>
<div id="verdict"></div>
<pre id="log"></pre>

<script>
// ── logger en pantalla ──────────────────────────────────────────
var T0 = (window.performance && performance.now) ? performance.now() : Date.now();
function now(){ return Math.round(((window.performance&&performance.now)?performance.now():Date.now()) - T0); }
var logEl = document.getElementById('log');
function L(cls, msg){
  var line = document.createElement('span');
  line.className = cls;
  line.textContent = '[' + String(now()).padStart(5,' ') + 'ms] ' + msg + '\n';
  logEl.appendChild(line);
}
function verdict(cls, msg){
  var v = document.getElementById('verdict');
  v.style.display = 'block';
  v.className = cls;
  v.style.background = cls === 'fail' ? 'rgba(220,38,38,.18)' : 'rgba(110,231,168,.15)';
  v.textContent = msg;
}
// ── captura TODO error que normalmente quedaría invisible ───────
window.onerror = function(m, src, line, col, err){
  L('fail', '❌ ERROR JS: ' + m + ' @' + (src||'').split('/').pop() + ':' + line);
  verdict('fail', 'Se rompió el JS aquí ↑ — ese error detiene el arranque y por eso queda "Cargando".');
  return false;
};
window.addEventListener('unhandledrejection', function(e){
  L('fail', '❌ PROMESA RECHAZADA SIN CAPTURA: ' + ((e.reason && e.reason.message) || e.reason));
});

// ── helper: corre una promesa con timeout y mide ────────────────
function timed(label, p, ms){
  var t = now();
  var timeout = new Promise(function(_, rej){ setTimeout(function(){ rej(new Error('TIMEOUT_' + ms + 'ms')); }, ms); });
  return Promise.race([p, timeout]).then(
    function(r){ L('ok', '✓ ' + label + ' OK (' + (now()-t) + 'ms)'); return r; },
    function(e){ L('fail', '✗ ' + label + ' → ' + e.message + ' (esperó ' + (now()-t) + 'ms)'); throw e; }
  );
}

var SB_URL  = 'https://lintmcxqxnrholslatul.supabase.co';
var SB_ANON = 'sb_publishable_9dpGbh-aKwTxC8gvOk8Muw_aSpMby0G';

(async function run(){
  L('step', '0. Script arrancó. ✅ (si ves esto, el HTML/JS sí corre)');

  // 1. Entorno
  try {
    L('step', '1. Entorno:');
    L('dim', '   online=' + navigator.onLine + '  SW.controller=' + (navigator.serviceWorker && navigator.serviceWorker.controller ? 'SÍ (controlado)' : 'no (sin SW)'));
    L('dim', '   UA=' + navigator.userAgent.slice(0,90));
    var keys = [];
    for (var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); keys.push(k + '(' + (localStorage.getItem(k)||'').length + 'b)'); }
    L('dim', '   localStorage: ' + (keys.join(', ') || 'vacío'));
    // ¿hay token supabase guardado? (sospechoso #1)
    ['ps_report_auth','ps_supa_auth','ops_ps_auth'].forEach(function(k){
      var v = localStorage.getItem(k);
      if (v) L('warn', '   ⚠ token guardado en ' + k + ' (' + v.length + ' bytes) — sospechoso del cuelgue');
    });
  } catch(e){ L('fail','   error leyendo entorno: '+e.message); }

  // 2. ¿supabase-js carga desde el CDN? (lo cargamos dinámico para medir)
  try {
    await timed('2. cargar supabase-js@2 (CDN)', new Promise(function(res, rej){
      if (window.supabase) return res('ya estaba');
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
      s.onload = function(){ res('cargado'); };
      s.onerror = function(){ rej(new Error('FALLO_CARGA_CDN')); };
      document.head.appendChild(s);
    }), 10000);
    L('dim', '   typeof supabase = ' + (typeof window.supabase) + ' · createClient=' + (window.supabase && typeof window.supabase.createClient));
  } catch(e){
    verdict('fail', 'PROBLEMA: supabase-js no cargó del CDN en hard-refresh. Sin él, todo se queda en "Cargando". (red/CDN/caché)');
    return;
  }

  // 3. createClient (¿el constructor se cuelga?)
  var sb;
  try {
    var tc = now();
    sb = window.supabase.createClient(SB_URL, SB_ANON, {
      auth: { persistSession:true, autoRefreshToken:true, storageKey:'ps_report_auth', lock:function(n,t,fn){ return fn(); } }
    });
    L('ok', '✓ 3. createClient OK (' + (now()-tc) + 'ms)');
  } catch(e){
    L('fail','✗ 3. createClient lanzó: '+e.message);
    verdict('fail','PROBLEMA: createClient falló. Ese throw detiene todo.');
    return;
  }

  // 4. getSession — EL principal sospechoso. Lo corremos con timeout de 8s.
  try {
    var s = await timed('4. sb.auth.getSession()', sb.auth.getSession(), 8000);
    L('dim', '   session=' + (s && s.data && s.data.session ? 'SÍ (hay login)' : 'no hay'));
  } catch(e){
    verdict('fail', '★ ENCONTRADO: getSession() se COLGÓ (>8s). Este es el cuelgue. Mi guardia de 4s debería cortarlo — si igual cuelga el reporte real, el problema es que el cuelgue es ANTES, en createClient/initialize. Avísame este resultado.');
    // seguimos para medir el resto igual
  }

  // 5. RPC anónimo (red a Supabase sin auth)
  try {
    await timed('5. fetch anon listar_operadores', fetch(SB_URL+'/rest/v1/rpc/listar_operadores', {
      method:'POST', headers:{ apikey:SB_ANON, 'Content-Type':'application/json' }, body:'{}'
    }).then(function(r){ return r.text(); }), 10000);
  } catch(e){
    L('fail','   la red a Supabase falló/colgó');
  }

  // 6. getSession DE NUEVO (por si el primer await dejó algo trabado)
  try {
    await timed('6. getSession() 2da vez', sb.auth.getSession(), 8000);
  } catch(e){}

  L('step', '7. ✅ Diagnóstico completo. Si llegaste hasta acá sin colgarte, el arranque está sano.');
  verdict('ok', '✅ El diagnóstico terminó sin colgarse. Si el reporte real SÍ se cuelga pero esto no, compará: la diferencia clave es el <script src=supabase> bloqueante del reporte vs la carga dinámica de acá.');
})();
</script>
</body>
</html>
