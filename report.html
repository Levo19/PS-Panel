<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reporte Lanchas · PS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root {
  --guinda:#7B2030; --guinda-dark:#5a1722; --guinda-light:#9d2a3e;
  --gold:#C9A84C; --gold-light:#e8c46a; --gold-pale:#f5e9c8;
  --bg:#0e0608; --bg2:#160b0d; --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07); --border:rgba(201,168,76,0.18);
  --text:#f0e6d3; --text-muted:rgba(240,230,211,0.5);
  --radius:14px; --radius-sm:10px;
  --green:#4ade80; --red:#f87171; --amber:#fbbf24; --blue:#60a5fa; --purple:#c084fc;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:14px;}

/* ── Shimmer ── */
.shimmer{background:linear-gradient(90deg,var(--gold-dark,#a88835),var(--gold-light),var(--gold),var(--gold-light),var(--gold-dark,#a88835));background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite;}
@keyframes shimmer{to{background-position:200% center;}}
.glass{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}

/* ── Header ── */
.rpt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;}
.rpt-logo{font-size:26px;font-weight:900;letter-spacing:-1px;}
.rpt-meta{text-align:right;}
.rpt-fecha{font-size:15px;font-weight:700;}
.rpt-refresh{font-size:11px;color:var(--text-muted);margin-top:2px;}
.countdown{color:var(--gold);font-weight:700;}

/* ── Botones ── */
.btn-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.btn{padding:9px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);display:flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-wa{background:rgba(37,211,102,0.15);color:#25d366;border-color:rgba(37,211,102,0.3);}
.btn-print{background:var(--surface);color:var(--text-muted);}

/* ── Alertas ── */
.alerta-box{border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;display:flex;flex-direction:column;gap:8px;border:1px solid rgba(248,113,113,0.35);background:rgba(248,113,113,0.07);}
.alerta-item{display:flex;align-items:center;gap:10px;font-size:13px;}
.alerta-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.alerta-verde{border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.06);}
/* ── Alerta expandible ── */
.alerta-exp{cursor:pointer;align-items:flex-start!important;}
.alerta-exp:hover{filter:brightness(1.07);}
.alerta-chev{font-size:11px;color:var(--text-muted);transition:transform .2s;flex-shrink:0;margin-top:1px;}
.alerta-item.open .alerta-chev{transform:rotate(180deg);}
.alerta-detail{display:none;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.07);}
.alerta-item.open .alerta-detail{display:block;}
.alrt-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);gap:8px;font-size:11px;}
.alrt-row:last-child{border-bottom:none;}
.alrt-sec{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);padding:5px 0 2px;}

/* ── Las 4 preguntas ── */
.q4-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.q4-card{padding:14px;border-radius:var(--radius);}
.q4-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;opacity:.7;}
.q4-val{font-size:26px;font-weight:900;line-height:1;}
.q4-unit{font-size:11px;font-weight:700;margin-left:3px;opacity:.7;}
.q4-sub{font-size:10px;margin-top:5px;opacity:.65;line-height:1.4;}
.q4-debo-pases{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);}
.q4-me-deben-pases{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);}
.q4-debo-plata{background:rgba(251,191,36,0.09);border:1px solid rgba(251,191,36,0.3);}
.q4-me-deben-plata{background:rgba(96,165,250,0.09);border:1px solid rgba(96,165,250,0.3);}

/* ── Q4 expandable ── */
.q4-card{cursor:pointer;user-select:none;transition:filter .15s;}
.q4-card:hover{filter:brightness(1.08);}
.q4-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.q4-chevron{font-size:13px;color:var(--text-muted);flex-shrink:0;transition:transform .2s;margin-top:3px;}
.q4-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.1);font-size:11px;}
.q4-card.open .q4-detail{display:block;}
.q4-card.open .q4-chevron{transform:rotate(180deg);}
.q4-di{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.06);gap:8px;}
.q4-di:last-child{border-bottom:none;}
.q4-di.top{align-items:flex-start;}
.q4-di-name{font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.q4-di-empty{color:var(--green);padding:5px 0;font-weight:700;}
.q4-di-section{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:6px 0 2px;}
/* ── Flujo expandable ── */
.flujo-item .flujo-detail{display:none;padding:6px 0 8px 118px;font-size:11px;}
.flujo-item.open .flujo-detail{display:block;}
.flujo-row{cursor:pointer;}
.flujo-chev{font-size:9px;display:inline-block;transition:transform .2s;color:var(--text-muted);vertical-align:middle;margin-left:2px;}
.flujo-item.open .flujo-chev{transform:rotate(180deg);}
.flujo-di{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04);gap:8px;font-size:11px;}
.flujo-di:last-child{border-bottom:none;}
@media(max-width:600px){.flujo-item .flujo-detail{padding-left:88px;}}

/* ── KPI strip ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px;}
.kpi-card{padding:12px 14px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}
.kpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:4px;}
.kpi-value{font-size:20px;font-weight:800;}
.kpi-sub{font-size:10px;color:var(--text-muted);margin-top:2px;}

/* ── Flujo de Valor ── */
.flujo-section{padding:14px 16px;margin-bottom:14px;}
.flujo-title{font-size:10px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.flujo-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.flujo-label{font-size:10px;color:var(--text-muted);width:110px;flex-shrink:0;text-align:right;line-height:1.3;}
.flujo-track{flex:1;height:10px;background:rgba(255,255,255,0.05);border-radius:5px;overflow:hidden;}
.flujo-bar{height:100%;border-radius:5px;min-width:2px;}
.flujo-val{font-size:11px;font-weight:800;width:80px;flex-shrink:0;text-align:right;}
.flujo-sep{border:none;border-top:1px dashed rgba(201,168,76,0.2);margin:6px 0 6px 118px;}

/* ── Gráficos ── */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:14px;}
.chart-card{padding:14px;}
.chart-title{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.chart-wrap{position:relative;height:170px;}

/* ── Section ── */
.section{margin-bottom:14px;}
.sec-hdr{font-size:10px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(201,168,76,0.2);}

/* ── Aliado balance ── */
.aliado-card{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;background:var(--surface);}
.aliado-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;gap:8px;}
.aliado-nombre{font-size:13px;font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.aliado-badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;flex-shrink:0;}
.badge-debes{background:rgba(248,113,113,0.18);color:var(--red);border:1px solid rgba(248,113,113,0.3);}
.badge-te-deben{background:rgba(74,222,128,0.15);color:var(--green);border:1px solid rgba(74,222,128,0.3);}
.badge-tablas{background:rgba(255,255,255,0.07);color:var(--text-muted);border:1px solid var(--border);}
.aliado-body{padding:10px 14px 12px;background:rgba(0,0,0,0.2);border-top:1px solid var(--border);display:none;}
.aliado-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;}
.aliado-row:last-child{border-bottom:none;}

/* ── Cobros pendientes ── */
.pend-table{width:100%;font-size:11px;border-collapse:collapse;}
.pend-table th{padding:6px 8px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);text-align:left;border-bottom:1px solid var(--border);}
.pend-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
.pend-table tr:last-child td{border-bottom:none;}
.pend-table tr:hover td{background:var(--surface2);}

/* ── Progress bar inline ── */
.prog-wrap{background:rgba(255,255,255,0.06);border-radius:3px;height:4px;overflow:hidden;margin-top:3px;}
.prog-bar{height:100%;border-radius:3px;}

/* ── Op cards ── */
.op-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;background:var(--surface);}
.op-card.op-viaje{border-color:rgba(251,191,36,0.4);}
.op-card.op-cerrada{border-color:rgba(74,222,128,0.25);}
.op-card.op-cancelada{border-color:rgba(100,100,100,0.2);opacity:.6;}
.op-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px;}
.op-nombre{font-size:14px;font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.occ-bar-wrap{height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;margin-top:5px;}
.occ-bar{height:100%;border-radius:3px;}
.type-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.type-chip{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;}

/* ── Manifiesto ── */
.mov-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);}
.mov-row:last-child{border-bottom:none;}
.mov-row.mov-cancelado{opacity:.4;text-decoration:line-through;}
.mov-total{display:flex;justify-content:space-between;padding:8px 10px;border-top:1px solid var(--border);margin-top:2px;font-size:12px;font-weight:800;}

/* ── Badges tipo ── */
.tipo-badge{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;}
.tipo-Directo{background:rgba(74,222,128,0.12);color:var(--green);}
.tipo-Agencia{background:rgba(96,165,250,0.12);color:var(--blue);}
.tipo-Comisionado{background:rgba(251,191,36,0.12);color:var(--amber);}
.tipo-AliadoPaseIn{background:rgba(96,165,250,0.12);color:var(--blue);}
.tipo-AliadoPaseOut{background:rgba(240,171,252,0.12);color:var(--purple);}
.tipo-Aliado{background:rgba(240,171,252,0.12);color:var(--purple);}
.tipo-PaseRecibido{background:rgba(251,146,60,0.12);color:#fb923c;}

/* ── Caja ── */
.caja-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border-radius:8px;margin-bottom:4px;}
.caja-ingreso{background:rgba(74,222,128,0.06);border-left:3px solid rgba(74,222,128,0.4);}
.caja-salida{background:rgba(239,68,68,0.06);border-left:3px solid rgba(239,68,68,0.35);}

/* ── Matrix ── */
.mx-table{width:100%;font-size:11px;border-collapse:collapse;}
.mx-table th{color:var(--gold);font-weight:700;padding:5px 8px;text-align:right;border-bottom:1px solid var(--border);}
.mx-table th:first-child{text-align:left;}
.mx-table td{padding:5px 8px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text-muted);}
.mx-table td:first-child{text-align:left;}
.mx-table td.v{color:var(--text);font-weight:700;}
.mx-table tfoot td{border-top:1px solid var(--border);color:var(--gold);font-weight:800;}

/* ── Spinner ── */
.loading{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:14px;}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Mobile ── */
@media(max-width:600px){
  body{padding:10px;}
  .q4-grid{grid-template-columns:1fr 1fr;}
  .q4-val{font-size:22px;}
  .charts-grid{grid-template-columns:1fr;}
  .chart-wrap{height:150px;}
  .flujo-label{width:88px;font-size:9px;}
  .flujo-val{width:70px;font-size:10px;}
  .flujo-sep{margin-left:96px;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
}
/* ── Print ── */
@media print{
  body{background:#fff;color:#000;padding:10px;}
  .btn-bar,.no-print{display:none!important;}
  .glass,.op-card,.aliado-card,.chart-card,.flujo-section{background:#f9f9f9!important;border-color:#ddd!important;}
  .shimmer{-webkit-text-fill-color:var(--guinda)!important;background:none!important;animation:none!important;}
  .q4-val,.kpi-value,.op-nombre,.aliado-nombre{color:#000!important;}
  .sec-hdr,.kpi-label,.chart-title,.q4-label,.flujo-title{color:#555!important;}
  .charts-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div id="root">
  <div class="loading"><div class="spin"></div><p style="color:var(--text-muted);font-size:13px;">Cargando reporte…</p></div>
</div>

<script>
const params  = new URLSearchParams(location.search);
function localDateStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
const fecha   = params.get('fecha') || localDateStr();
const PS_GAS  = 'https://script.google.com/macros/s/AKfycby7_H2lEOweA4cpixzNUw_50EfuQtiSoIW2389U5Ipyic3GRmETSRgBYSpIAaMcARcMhA/exec';
const API_URL = params.get('api') || localStorage.getItem('ps_api_url') || PS_GAS;

const REFRESH = 60;
const TIPOS_SIN_COBRO = ['Aliado(PaseIn)','Pase_Recibido','Aliado'];
let countdown = REFRESH, timer = null, charts = {};

// ── Utils ──────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt   = v => (parseFloat(v)||0).toLocaleString('es-PE',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtD  = v => (parseFloat(v)||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const S     = v => 'S/ ' + fmtD(v);
const pct   = (a,b) => b > 0 ? Math.min(100,(a/b*100)) : 0;
const fw    = (v,max) => Math.min(100,Math.max(1.5,(v/(max||1))*100)).toFixed(1);

function fmtFecha(f) {
  const [y,m,d] = f.split('-');
  const M = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${d} ${M[parseInt(m)-1]} ${y}`;
}
function tipoBadgeClass(tipo) {
  const map = {'Aliado(PaseIn)':'AliadoPaseIn','Aliado(PaseOut)':'AliadoPaseOut','Pase_Recibido':'PaseRecibido'};
  return 'tipo-badge tipo-' + (map[tipo] || String(tipo||'').replace(/[^a-zA-Z0-9]/g,''));
}
function contactColor(tipo) {
  const t = String(tipo||'').toLowerCase();
  if (t.includes('agencia')) return 'var(--blue)';
  if (t.includes('comisionado')) return 'var(--amber)';
  if (t.includes('aliado')||t.includes('paseout')) return 'var(--purple)';
  if (t.includes('pase')) return '#fb923c';
  return 'var(--green)';
}
function metIcon(m) {
  const k = String(m||'').toLowerCase();
  return k.includes('yape')?'📱':k.includes('plin')?'📲':k.includes('trans')?'🏦':k.includes('tarj')?'💳':'💵';
}
function isIngreso(c) {
  const cat = String(c.categoria||'').toLowerCase();
  return cat.includes('cobro')||cat.includes('ingreso')||cat.includes('venta');
}
function adicsSum(m) {
  return m.adicionales
    ? String(m.adicionales).split(',').reduce((acc, p) => {
        const sep = p.indexOf(':'); return acc + (sep !== -1 ? parseFloat(p.substring(sep+1).trim())||0 : 0);
      }, 0)
    : 0;
}
function movTotal(m) { return (parseFloat(m.monto_total)||0) + adicsSum(m); }
function montoPayColor(op, mov) {
  const paid = (op.caja||[]).filter(c=>String(c.id_movimiento||'')===String(mov.id_mov||'')).reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
  const total = movTotal(mov);
  if (!total) return 'color:var(--text-muted)';
  return paid >= total*0.99 ? 'color:var(--green)' : paid > 0 ? 'color:var(--amber)' : 'color:var(--red)';
}
function pagadoMov(allCaja, movId) {
  return allCaja.filter(c=>String(c.id_movimiento||'')===String(movId||'')).reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
}

// ── Fetch ──────────────────────────────────────────────────────
async function loadData() {
  try {
    const url = new URL(API_URL);
    url.searchParams.set('accion','lanchas_dia');
    url.searchParams.set('fecha', fecha);
    const r = await fetch(url.toString(), { cache:'no-store' });
    const json = await r.json();
    if (json.ok) render(json.data);
    else renderError('Error del servidor: ' + json.error);
  } catch(e) { renderError('Sin conexión: ' + e.message); }
}

function startCountdown() {
  clearInterval(timer);
  countdown = REFRESH;
  timer = setInterval(() => {
    countdown--;
    const el = $('countdown');
    if (el) el.textContent = '0:' + String(countdown).padStart(2,'0');
    if (countdown <= 0) { loadData(); countdown = REFRESH; }
  }, 1000);
}

function whatsappShare() {
  const text = `📊 Reporte Lanchas ${fmtFecha(fecha)}\n${location.href}`;
  if (navigator.share) {
    navigator.share({ text }).catch(err => {
      if (err.name !== 'AbortError') _waFallback(text);
    });
  } else {
    _waFallback(text);
  }
}
function _waFallback(text) {
  window.location.href = 'whatsapp://send?text=' + encodeURIComponent(text);
}

// ── Render principal ───────────────────────────────────────────
function render(data) {
  const ops        = data.operaciones   || [];
  const pasesSuelt = data.pases_sueltos || [];
  const cajaSuelta = data.caja_suelta   || [];
  const kpis       = data.kpis          || {};

  // ── Colecciones globales ──
  const allMovs = [];
  ops.forEach(op => (op.movimientos||[]).forEach(m => allMovs.push({ ...m, _op: op })));
  pasesSuelt.forEach(m => allMovs.push({ ...m, _op: null }));

  const allCaja = [];
  ops.forEach(op => (op.caja||[]).forEach(c => allCaja.push({ ...c, _bote: op.nombre_bote||op.id_bote })));
  cajaSuelta.forEach(c => allCaja.push({ ...c, _bote: '' }));

  // ── CÁLCULO: cobros (todos los movimientos cobrables) ────────
  const cobrosAllArr = [];
  allMovs.forEach(m => {
    if (m.estado === 'Cancelado') return;
    if (TIPOS_SIN_COBRO.includes(m.tipo)) return;
    const base = parseFloat(m.monto_total) || 0;
    const adicionalesSum = adicsSum(m);
    const total = base + adicionalesSum;
    if (!total) return;
    const pagado = pagadoMov(allCaja, m.id_mov);
    cobrosAllArr.push({
      id_mov: m.id_mov, nombre: m.nombre_contacto || '—', tipo: m.tipo,
      bote: m._op ? (m._op.nombre_bote||m._op.id_bote) : '—',
      adicionales: String(m.adicionales||''),
      base, adicionalesSum, total, pagado, pendiente: Math.max(0, total - pagado)
    });
  });
  // cobrosArr: solo pendientes → para alertas y flujo
  const cobrosArr = cobrosAllArr.filter(c => c.pendiente > 0.01).sort((a,b) => b.pendiente - a.pendiente);
  const totalPendCobrar = cobrosArr.reduce((s,c) => s + c.pendiente, 0);
  // cobrosClientArr: agrupado por cliente → para la sección "Plata que debo cobrar"
  const cobrosClientMap = {};
  cobrosAllArr.forEach(c => {
    if (!cobrosClientMap[c.nombre]) cobrosClientMap[c.nombre] = { tipo: c.tipo, movs: [], total: 0, pagado: 0, pendiente: 0 };
    cobrosClientMap[c.nombre].movs.push(c);
    cobrosClientMap[c.nombre].total    += c.total;
    cobrosClientMap[c.nombre].pagado   += c.pagado;
    cobrosClientMap[c.nombre].pendiente += c.pendiente;
  });
  const cobrosClientArr = Object.entries(cobrosClientMap)
    .sort((a,b) => b[1].pendiente - a[1].pendiente || a[0].localeCompare(b[0]));

  // ── CÁLCULO: pases enviados vs recibidos (balance aliados) ───
  const aliadoMap = {}; // nombre_aliado → { out, in, outItems, inItems, pendCompra }
  function getAliado(nombre) {
    if (!aliadoMap[nombre]) aliadoMap[nombre] = { out:0, in:0, outItems:[], inItems:[], pendCompra:0 };
    return aliadoMap[nombre];
  }
  allMovs.forEach(m => {
    if (m.estado === 'Cancelado') return;
    // PaseOut: movimiento con Id_contactoPase set
    if (m.id_contacto_pase) {
      const aliado = m.nombre_contacto_pase || m.id_contacto_pase;
      const d = getAliado(aliado);
      d.out += parseInt(m.cant_pax) || 0;
      d.outItems.push({ pax: m.cant_pax, origen: m.nombre_contacto,
        cobrado: !!m.id_agencia_comprada, monto: parseFloat(m.monto_comprado)||0,
        montoOrig: parseFloat(m.monto_total)||0 });
      if (!m.id_agencia_comprada) d.pendCompra += parseFloat(m.monto_total) || 0;
    }
    // PaseIn: Aliado(PaseIn) o Pase_Recibido
    if (m.tipo === 'Aliado(PaseIn)' || m.tipo === 'Pase_Recibido') {
      const aliado = m.nombre_contacto || m.id_contacto;
      const d = getAliado(aliado);
      d.in += parseInt(m.cant_pax) || 0;
      d.inItems.push({ pax: m.cant_pax });
    }
  });
  const aliadoArr = Object.entries(aliadoMap).sort((a,b) => {
    const sA = a[1].in - a[1].out, sB = b[1].in - b[1].out;
    if (sA !== sB) return sA - sB; // negativos (debo) primero
    return a[0].localeCompare(b[0]);
  });
  const totalPaxOut  = aliadoArr.reduce((s,[,d])=>s+d.out, 0);
  const totalPaxIn   = aliadoArr.reduce((s,[,d])=>s+d.in,  0);
  const totalPendCompra = aliadoArr.reduce((s,[,d])=>s+d.pendCompra, 0);
  // Neto por aliado cruzado: suma de los saldos desfavorables en cada dirección
  const netDeboPases    = aliadoArr.reduce((s,[,d])=>s+Math.max(0,d.out-d.in), 0);
  const netMeDebenPases = aliadoArr.reduce((s,[,d])=>s+Math.max(0,d.in-d.out), 0);

  // ── CÁLCULO: comisionados (plata que debo) ───────────────────
  const comMap = {}; // nombre → { pax, cobrado, comision, pagado }
  allMovs.forEach(m => {
    if (m.tipo !== 'Comisionado' || m.estado === 'Cancelado') return;
    const key   = m.nombre_contacto || m.id_contacto;
    const pax   = parseInt(m.cant_pax) || 0;
    const precioApl  = parseFloat(m.precio_aplicado) || 0;
    const precioDef  = parseFloat(m.precio_defecto)  || 0;
    const cobrado    = parseFloat(m.monto_total) || 0;
    const margen     = precioDef * pax;
    const comision   = Math.max(0, (precioApl * pax) - margen);
    if (!comMap[key]) comMap[key] = { pax:0, cobrado:0, comision:0, pagado:0 };
    comMap[key].pax      += pax;
    comMap[key].cobrado  += cobrado;
    comMap[key].comision += comision;
  });
  // Cruzar pagos de comisionados desde caja (categoria='Pagos' o 'Pago_Comisionado')
  allCaja.forEach(c => {
    if (!String(c.categoria||'').toLowerCase().includes('pago')) return;
    const key = c.id_contacto ? c.id_contacto : null;
    if (!key || !comMap[key]) return;
    comMap[key].pagado += parseFloat(c.monto) || 0;
  });
  const comArr = Object.entries(comMap).filter(([,d])=>d.comision > 0);
  const totalDebeComis  = comArr.reduce((s,[,d])=>s+Math.max(0,d.comision-d.pagado), 0);

  // ── Las 4 preguntas totales ──
  const totalDeboPases   = netDeboPases;    // PAX netos que debo (∑ saldos desfavorables)
  const totalMeDebenPases = netMeDebenPases; // PAX netos que me deben (∑ saldos a favor)
  const totalDeudaComisGAS = kpis.deuda_comisionados || 0;
  const totalDeboDinero  = totalDeudaComisGAS; // solo comisiones pendientes de pagar
  const totalMeDebenDinero = totalPendCobrar;

  // ── Q4 detail items ──────────────────────────────────────────
  const deboPasesRows = aliadoArr.filter(([,d])=>d.out>d.in).map(([nombre,d])=>
    `<div class="q4-di"><span class="q4-di-name">${nombre}</span><span style="color:var(--red);">↑${d.out} env.${d.in?' · ↓'+d.in+' rec.':''} = <b>${d.out-d.in} PAX</b></span></div>`
  ).join('') || '<div class="q4-di-empty">Sin pases pendientes ✓</div>';

  const meDebenPasesRows = aliadoArr.filter(([,d])=>d.in>d.out).map(([nombre,d])=>
    `<div class="q4-di"><span class="q4-di-name">${nombre}</span><span style="color:var(--green);">↓${d.in} rec.${d.out?' · ↑'+d.out+' env.':''} = <b>+${d.in-d.out} PAX</b></span></div>`
  ).join('') || '<div class="q4-di-empty" style="color:var(--text-muted);">Sin pases a favor.</div>';

  const deboPlataCom = comArr.filter(([,d])=>d.comision-d.pagado>0.01).map(([nombre,d])=>`
    <div class="q4-di"><span class="q4-di-name">👤 ${nombre}</span><span style="color:var(--purple);">${S(d.comision)}<small style="color:var(--text-muted);"> total</small>${d.pagado>0?' · '+S(d.pagado)+' pag.':''}</span></div>`
  ).join('');
  // "Plata que DEBO" = solo comisiones. pendCompra está en cobrosArr (me lo deben a mí).
  const deboPlataTodo = deboPlataCom
    ? '<div class="q4-di-section">Comisiones pendientes por pagar</div>'+deboPlataCom
    : '<div class="q4-di-empty">Sin comisiones pendientes ✓</div>';

  // Agrupa cobros por tipo para el desglose del q4 "plata que me deben"
  const GRUPO_ORDEN = ['Agencia','Comisionado','Directo','Libre'];
  const cobrosGrupo = {};
  cobrosArr.forEach(c => {
    const g = GRUPO_ORDEN.includes(c.tipo) ? c.tipo : 'Otro';
    if (!cobrosGrupo[g]) cobrosGrupo[g] = [];
    cobrosGrupo[g].push(c);
  });
  const meDebenPlatRows = GRUPO_ORDEN.concat(Object.keys(cobrosGrupo).filter(g=>!GRUPO_ORDEN.includes(g))).filter(g=>cobrosGrupo[g]).flatMap(grupo => {
    const items = cobrosGrupo[grupo];
    const nota = grupo==='Comisionado' ? ' <span style="color:var(--text-muted);font-size:9px;">(pago del cliente)</span>' : '';
    return [`<div class="q4-di-section">${grupo}${nota}</div>`,
      ...items.map(c=>{
        const avPct = pct(c.pagado, c.total);
        return `<div class="q4-di top">
          <div style="flex:1;min-width:0;">
            <div class="q4-di-name">${c.nombre}</div>
            <div style="color:var(--text-muted);font-size:10px;">${c.bote}${c.pagado>0?' · cobrado '+S(c.pagado):''}</div>
            <div class="prog-wrap" style="margin-top:3px;"><div class="prog-bar" style="width:${avPct}%;background:${avPct>0?'var(--green)':'var(--red)'};"></div></div>
          </div>
          <span style="color:var(--red);font-weight:800;flex-shrink:0;padding-left:8px;">${S(c.pendiente)}</span>
        </div>`;
      })
    ];
  }).join('') || '<div class="q4-di-empty">Sin cobros pendientes ✓</div>';

  // ── CÁLCULO: adicionales por tipo ───────────────────────────
  const adicsTypeMap = {};
  allMovs.forEach(m => {
    if (m.estado === 'Cancelado' || !m.adicionales) return;
    String(m.adicionales).split(',').forEach(p => {
      const sep = p.indexOf(':'); if (sep === -1) return;
      const nombre = p.substring(0, sep).trim();
      const val    = parseFloat(p.substring(sep+1).trim()) || 0;
      if (nombre && val > 0) adicsTypeMap[nombre] = (adicsTypeMap[nombre]||0) + val;
    });
  });

  // ── CÁLCULO: método de pago ──────────────────────────────────
  const metMap = {};
  allCaja.forEach(c => {
    const k = c.metodo_pago || 'Efectivo';
    if (!metMap[k]) metMap[k] = {ing:0,sal:0};
    isIngreso(c) ? (metMap[k].ing += parseFloat(c.monto)||0) : (metMap[k].sal += parseFloat(c.monto)||0);
  });

  // ── PAX que realmente viajaron en mis botes ──────────────────
  // Excluye PaseOut (id_contacto_pase: esos PAX se fueron a otro bote)
  // PaseIn (Aliado(PaseIn)/Pase_Recibido) se agrupa como "Recibidos"
  const paxEnBotesMap = {};
  allMovs.forEach(m => {
    if (m.estado==='Cancelado') return;
    if (m.id_contacto_pase) return; // PaseOut: salió de nuestros botes
    const pax = parseInt(m.cant_pax)||0;
    if (!pax) return;
    const label = TIPOS_SIN_COBRO.includes(m.tipo) ? 'Recibidos' : (m.tipo||'Otro');
    paxEnBotesMap[label] = (paxEnBotesMap[label]||0) + pax;
  });

  // ── CÁLCULO: ingresos por tipo de cliente (para gráfico de revenue) ──
  const tipoIngMap = {};
  allMovs.forEach(m => {
    if (m.estado==='Cancelado'||TIPOS_SIN_COBRO.includes(m.tipo)) return;
    if (m.id_contacto_pase) return; // PaseOut cobra al cliente pero el PAX no está en nuestro bote
    const k = m.tipo||'?';
    tipoIngMap[k] = (tipoIngMap[k]||0) + movTotal(m);
  });

  // ── PAX matrix ───────────────────────────────────────────────
  const paxMatrix = {};
  allMovs.forEach(m => {
    const t = m.tipo||'?';
    if (!paxMatrix[t]) paxMatrix[t] = {emb:0,can:0,pas:0};
    if (m.estado==='Cancelado') paxMatrix[t].can += parseInt(m.cant_pax)||0;
    else if (!m._op) paxMatrix[t].pas += parseInt(m.cant_pax)||0;
    else paxMatrix[t].emb += parseInt(m.cant_pax)||0;
  });

  // ── Flujo de Valor ───────────────────────────────────────────
  const ingEfectivo = kpis.caja_efectivo || 0;
  const ingVirtual  = kpis.caja_transferencia || 0;
  const netoTotal   = ingEfectivo + ingVirtual;
  // Bruto calculado desde movimientos: incluye PaseOut (el cliente paga aunque el PAX vaya a otro bote)
  // y pases_sueltos (movimientos sin operación asignada). Excluye TIPOS_SIN_COBRO (aliados/pases recibidos).
  const bruto = allMovs
    .filter(m => m.estado !== 'Cancelado' && !TIPOS_SIN_COBRO.includes(m.tipo))
    .reduce((s, m) => s + movTotal(m), 0);
  // Desglose del bruto: pasados (PaseOut cobrables), sueltos (sin op), en ops (el resto)
  const brutoPasados = allMovs
    .filter(m => m.estado !== 'Cancelado' && !TIPOS_SIN_COBRO.includes(m.tipo) && !!m.id_contacto_pase)
    .reduce((s, m) => s + movTotal(m), 0);
  // Libres = sueltos sin PaseOut (los sueltos PaseOut ya van en brutoPasados)
  const brutoSuelt = pasesSuelt
    .filter(m => m.estado !== 'Cancelado' && !TIPOS_SIN_COBRO.includes(m.tipo) && !m.id_contacto_pase)
    .reduce((s, m) => s + movTotal(m), 0);
  const brutoEnOps = bruto - brutoPasados - brutoSuelt;
  // PAX total desde movimientos (incluye pases_sueltos, excluye cancelados)
  const paxTotalAll = allMovs
    .filter(m => m.estado !== 'Cancelado')
    .reduce((s, m) => s + (parseInt(m.cant_pax) || 0), 0);
  const paxLibres = pasesSuelt
    .filter(m => m.estado !== 'Cancelado')
    .reduce((s, m) => s + (parseInt(m.cant_pax) || 0), 0);
  const maxFlujo = Math.max(bruto, totalDeudaComisGAS, totalMeDebenDinero, 1);

  // ── Destroy previous charts ──────────────────────────────────
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};

  // ============================================================
  // HTML
  // ============================================================

  // ── Alertas expandibles ──────────────────────────────────────
  function alerta(color, summaryHtml, detailHtml) {
    return `<div class="alerta-item alerta-exp" onclick="this.classList.toggle('open')">
      <span class="alerta-dot" style="background:${color};margin-top:4px;"></span>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;">
          <span style="flex:1;">${summaryHtml}</span>
          <span class="alerta-chev">▾</span>
        </div>
        <div class="alerta-detail">${detailHtml}</div>
      </div>
    </div>`;
  }

  const alertItems = [];

  // 1. Cobros sin completar — desglose por tipo de contacto
  if (cobrosArr.length > 0) {
    const detCobros = GRUPO_ORDEN.concat(Object.keys(cobrosGrupo).filter(g=>!GRUPO_ORDEN.includes(g)))
      .filter(g=>cobrosGrupo[g]).map(g =>
        `<div class="alrt-sec">${g}${g==='Comisionado'?' <small style="font-weight:400;font-size:9px;text-transform:none;letter-spacing:0;">(paga el cliente directo)</small>':''}</div>`
        + cobrosGrupo[g].map(c=>`<div class="alrt-row"><span>${c.nombre}${c.bote&&c.bote!=='—'?' · <span style="opacity:.6;">'+c.bote+'</span>':''}</span><span style="color:var(--red);font-weight:700;">${S(c.pendiente)}</span></div>`).join('')
      ).join('');
    alertItems.push(alerta('var(--red)',
      `<b>${cobrosArr.length}</b> cobro${cobrosArr.length>1?'s':''} sin completar — <b style="color:var(--red)">${S(totalMeDebenDinero)}</b> pendiente`,
      detCobros));
  }

  // 2. Pases netos que debemos — por aliado
  if (netDeboPases > 0) {
    const deudores = aliadoArr.filter(([,d])=>d.out>d.in);
    const detPases = deudores.map(([nombre,d])=>
      `<div class="alrt-row"><span>🤝 ${nombre}</span><span style="color:var(--amber);">↑${d.out} env.${d.in?' · ↓'+d.in+' rec.':''} = <b>${d.out-d.in} PAX</b></span></div>`
    ).join('');
    alertItems.push(alerta('var(--amber)',
      `Pases netos que debemos: <b style="color:var(--amber)">${netDeboPases} PAX</b> a ${deudores.length} aliado${deudores.length>1?'s':''}`,
      detPases));
  }

  // 3. Comisiones pendientes — por comisionado
  if (totalDebeComis > 0) {
    const detComis = comArr.filter(([,d])=>d.comision-d.pagado>0.01).map(([nombre,d])=>{
      const pend = d.comision - d.pagado;
      return `<div class="alrt-row"><span>👤 ${nombre} · ${d.pax} pax</span><span style="color:var(--purple);font-weight:700;">${S(pend)} pendiente${d.pagado>0?' ('+S(d.pagado)+' pagado)':''}</span></div>`;
    }).join('');
    alertItems.push(alerta('var(--purple)',
      `Comisiones pendientes de pago: <b style="color:var(--purple)">${S(totalDebeComis)}</b>`,
      detComis));
  }

  const alertaHtml = alertItems.length > 0
    ? `<div class="alerta-box" style="gap:10px;">${alertItems.join('')}</div>`
    : `<div class="alerta-box alerta-verde"><div class="alerta-item"><span class="alerta-dot" style="background:var(--green)"></span><span style="color:var(--green);font-weight:700;">✓ Turno limpio — sin cobros ni pases pendientes</span></div></div>`;

  // ── 2 preguntas de dinero (expandibles) ─────────────────────
  // Los pases se fusionaron con el Balance Aliados (sección subida arriba)
  const q4Html = `
  <div style="font-size:10px;color:var(--text-muted);margin-bottom:6px;text-align:right;">Toca cada tarjeta para ver el desglose ▾</div>
  <div class="q4-grid">
    <div class="q4-card q4-debo-plata glass" onclick="this.classList.toggle('open')">
      <div class="q4-hdr">
        <div>
          <div class="q4-label" style="color:var(--amber);">💸 Plata que DEBO</div>
          <div class="q4-val" style="color:var(--amber);font-size:22px;">${S(totalDeboDinero)}</div>
          <div class="q4-sub" style="margin-top:3px;">${totalDeudaComisGAS>0?comArr.filter(([,d])=>d.comision-d.pagado>0.01).length+' comisionado'+(comArr.filter(([,d])=>d.comision-d.pagado>0.01).length>1?'s':''):'Sin comisiones pendientes ✓'}</div>
        </div>
        <span class="q4-chevron">▾</span>
      </div>
      <div class="q4-detail">${deboPlataTodo}</div>
    </div>
    <div class="q4-card q4-me-deben-plata glass" onclick="this.classList.toggle('open')">
      <div class="q4-hdr">
        <div>
          <div class="q4-label" style="color:var(--blue);">💰 Plata que ME DEBEN</div>
          <div class="q4-val" style="color:var(--blue);font-size:22px;">${S(totalMeDebenDinero)}</div>
          <div class="q4-sub" style="margin-top:3px;">${cobrosArr.length>0?cobrosArr.length+' cobro'+(cobrosArr.length>1?'s':'')+' pendiente'+(cobrosArr.length>1?'s':''):'Todo cobrado ✓'}</div>
        </div>
        <span class="q4-chevron">▾</span>
      </div>
      <div class="q4-detail">${meDebenPlatRows}</div>
    </div>
  </div>`;

  // ── KPI strip ────────────────────────────────────────────────
  const kpiHtml = `
  <div class="kpi-row">
    <div class="kpi-card glass">
      <div class="kpi-label">PAX Total</div>
      <div class="kpi-value shimmer">${paxTotalAll}</div>
      <div class="kpi-sub">${ops.length} op${ops.length!==1?'s':''}${paxLibres>0?' · '+paxLibres+' libres':''}</div>
    </div>
    <div class="kpi-card glass">
      <div class="kpi-label">Neto empresa</div>
      <div class="kpi-value" style="color:var(--gold)">${S(bruto - totalDeudaComisGAS)}</div>
      <div class="kpi-sub">${S(brutoEnOps)} en ops${brutoPasados>0?' · '+S(brutoPasados)+' pasados':''}</div>
    </div>
    <div class="kpi-card glass">
      <div class="kpi-label">💵 Efectivo</div>
      <div class="kpi-value" style="color:var(--green)">${S(ingEfectivo)}</div>
    </div>
    <div class="kpi-card glass">
      <div class="kpi-label">🏦 Virtual</div>
      <div class="kpi-value" style="color:var(--blue)">${S(ingVirtual)}</div>
    </div>
  </div>`;

  // ── Flujo de Valor — detalles expandibles ───────────────────
  const flujoDetFacturado = [
    ...ops.map(op => {
      const opRev = (op.movimientos||[])
        .filter(m => m.estado !== 'Cancelado' && !TIPOS_SIN_COBRO.includes(m.tipo))
        .reduce((s2, m) => s2 + movTotal(m), 0);
      return `<div class="flujo-di"><span>⛵ ${op.nombre_bote||op.id_bote}</span><span style="color:var(--gold);font-weight:800;">${S(opRev)}</span></div>`;
    }),
    ...(brutoSuelt > 0 ? [`<div class="flujo-di"><span>📋 Sin operación asignada</span><span style="color:var(--amber);font-weight:800;">${S(brutoSuelt)}</span></div>`] : [])
  ].join('') || '<div class="flujo-di"><span style="color:var(--text-muted);">Sin operaciones</span></div>';

  const flujoDetComisiones = comArr.map(([nombre,d])=>
    `<div class="flujo-di"><span>👤 ${nombre} · ${d.pax} pax</span><span style="color:var(--red);">${S(d.comision)}</span></div>`
  ).join('') || '<div class="flujo-di"><span style="color:var(--text-muted);">Sin comisionados</span></div>';

  const flujoDetNeto = `
    <div class="flujo-di"><span>Facturado bruto</span><span style="color:var(--gold);">${S(bruto)}</span></div>
    <div class="flujo-di"><span>− Comisiones</span><span style="color:var(--red);">−${S(totalDeudaComisGAS)}</span></div>
    <div class="flujo-di" style="border-top:1px solid var(--border);padding-top:4px;margin-top:2px;font-weight:800;"><span>= Neto empresa</span><span style="color:var(--green);">${S(bruto-totalDeudaComisGAS)}</span></div>`;

  const flujoDetPorCobrar = cobrosArr.length > 0
    ? cobrosArr.slice(0,10).map(c=>`<div class="flujo-di"><span>${c.nombre} · <span style="color:var(--text-muted);">${c.bote}</span></span><span style="color:var(--blue);">${S(c.pendiente)}</span></div>`).join('')
      + (cobrosArr.length>10?`<div class="flujo-di"><span style="color:var(--text-muted);">… y ${cobrosArr.length-10} más</span></div>`:'')
    : '<div class="flujo-di"><span style="color:var(--green);">Sin cobros pendientes ✓</span></div>';

  const flujoDetAgencias = aliadoArr.filter(([,d])=>d.pendCompra>0).map(([nombre,d])=>
    `<div class="flujo-di"><span>🤝 ${nombre}</span><span style="color:var(--amber);">${S(d.pendCompra)}</span></div>`
  ).join('') || '<div class="flujo-di"><span style="color:var(--text-muted);">Sin pendientes</span></div>';

  const flujoDetEfectivo = allCaja.filter(c=>isIngreso(c)&&(!c.metodo_pago||String(c.metodo_pago||'').toLowerCase().includes('efectivo'))).map(c=>

  const flujoDetVirtual = allCaja.filter(c=>isIngreso(c)&&c.metodo_pago&&!String(c.metodo_pago||'').toLowerCase().includes('efectivo')).map(c=>
    `<div class="flujo-di"><span>${metIcon(c.metodo_pago)} ${c.operador||c.categoria} · ${c.metodo_pago}</span><span style="color:var(--blue);">${S(c.monto)}</span></div>`
  ).join('') || '<div class="flujo-di"><span style="color:var(--text-muted);">Sin pagos virtuales</span></div>';

  function fRow(labelHtml, labelStyle, barColor, barWidth, val, valStyle, detailHtml, extraRowStyle) {
    return `<div class="flujo-item">
      <div class="flujo-row" onclick="this.closest('.flujo-item').classList.toggle('open')"${extraRowStyle?' style="'+extraRowStyle+'"':''}>

  const flujoHtml = `
  <div class="flujo-section glass">
    <div class="flujo-title">💹 Flujo de Valor <span style="font-size:9px;color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0;">(toca cada línea para ver detalle)</span></div>
    ${fRow('Facturado','','rgba(201,168,76,0.4)','100',S(bruto),'color:var(--gold)',flujoDetFacturado,'')}
    ${totalDeudaComisGAS > 0 ? fRow('− Comisiones','color:var(--red)','rgba(248,113,113,0.45)',fw(totalDeudaComisGAS,maxFlujo),'−'+S(totalDeudaComisGAS),'color:var(--red)',flujoDetComisiones,'') : ''}
    <hr class="flujo-sep">
    ${fRow('= Neto empresa','color:var(--green);font-weight:700','rgba(74,222,128,0.45)',fw(bruto-totalDeudaComisGAS,maxFlujo),S(bruto-totalDeudaComisGAS),'color:var(--green);font-size:13px',flujoDetNeto,'')}
    ${totalMeDebenDinero > 0 ? '<hr class="flujo-sep">'+fRow('⏳ Por cobrar','color:var(--blue)','rgba(96,165,250,0.4)',fw(totalMeDebenDinero,maxFlujo),S(totalMeDebenDinero),'color:var(--blue)',flujoDetPorCobrar,'') : ''}
    ${/* pendCompra ya está en cobrosArr (plata que me deben) → no va en flujo separado */ ''}
    ${fRow('💵 Efectivo','color:var(--gold)','rgba(74,222,128,0.5)',fw(ingEfectivo,netoTotal),S(ingEfectivo),'color:var(--green)',flujoDetEfectivo,'margin-top:8px')}
    ${fRow('🏦 Virtual','color:var(--blue)','rgba(96,165,250,0.5)',fw(ingVirtual,netoTotal),S(ingVirtual),'color:var(--blue)',flujoDetVirtual,'')}
  </div>`;

  // ── Aliados balance ──────────────────────────────────────────
  const aliadoHtml = aliadoArr.length > 0 ? aliadoArr.map(([nombre, d]) => {
    const saldo = d.in - d.out;
    const saldoLabel = saldo === 0 ? 'Tablas' : saldo > 0 ? `+${saldo} PAX a favor` : `${saldo} PAX — debemos`;
    const badgeClass = saldo === 0 ? 'badge-tablas' : saldo > 0 ? 'badge-te-deben' : 'badge-debes';
    const saldoColor = saldo > 0 ? 'var(--green)' : saldo < 0 ? 'var(--red)' : 'var(--text-muted)';

    // Aliados son solo PAX — no dinero. El cobro del cliente es independiente en caja.
    const outRows = d.outItems.map(x =>
      `<div class="aliado-row">
        <span style="color:var(--red);font-weight:700;width:20px;text-align:center;flex-shrink:0;">↑</span>
        <span style="flex:1;font-size:12px;">Enviamos <b>${x.pax}</b> pax · <em>${x.origen}</em></span>
        <span style="font-size:11px;color:var(--text-muted);">solo PAX</span>
      </div>`).join('');
    const inRows = d.inItems.map(x =>
      `<div class="aliado-row">
        <span style="color:var(--green);font-weight:700;width:20px;text-align:center;flex-shrink:0;">↓</span>
        <span style="flex:1;font-size:12px;">Recibimos <b>${x.pax}</b> pax</span>
        <span style="font-size:11px;color:var(--text-muted);">sin cobro</span>

    const uid = 'al-' + nombre.replace(/[^a-z0-9]/gi,'');
    return `
    <div class="aliado-card">
      <div class="aliado-hdr" onclick="const b=$('${uid}');b.style.display=b.style.display==='none'?'block':'none'">
        <div>
          <div style="font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;">Aliado</div>
          <div class="aliado-nombre">${nombre}</div>
          <div style="font-size:10px;margin-top:3px;">
            ${d.out > 0 ? `<span style="color:var(--red);">↑${d.out} enviados</span>` : ''}
            ${d.out > 0 && d.in > 0 ? ' · ' : ''}
            ${d.in > 0 ? `<span style="color:var(--green);">↓${d.in} recibidos</span>` : ''}
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:20px;font-weight:900;color:${saldoColor};">${saldo > 0 ? '+' : ''}${saldo} <span style="font-size:11px;">PAX</span></div>
          <span class="aliado-badge ${badgeClass}">${saldoLabel}</span>
        </div>
      </div>
      <div id="${uid}" class="aliado-body" style="display:none;">${outRows}${inRows}</div>
    </div>`;
  }).join('') : '<div style="color:var(--text-muted);font-size:13px;padding:10px 0;">Sin pases registrados este día.</div>';

  // ── Plata que debo cobrar (todos los movimientos cobrables, agrupados por cliente) ──
  const cobrosClientHtml = cobrosClientArr.length > 0 ? cobrosClientArr.map(([nombre, d]) => {
    const isPend = d.pendiente > 0.01;
    const uid = 'cc-' + nombre.replace(/[^a-z0-9]/gi,'_');
    const movsHtml = d.movs.map(m => {
      const avPct = pct(m.pagado, m.total);
      const statusColor = m.pendiente > 0.01 ? 'var(--red)' : 'var(--green)';
      const statusLabel = m.pendiente > 0.01
        ? (m.pagado > 0 ? `${S(m.pendiente)} pendiente · cobrado ${S(m.pagado)}` : `${S(m.pendiente)} sin cobrar`)
        : `✓ ${S(m.total)}`;
      const adicsTag = m.adicionalesSum > 0
        ? '<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;">' +
          m.adicionales.split(',').filter(p=>p.indexOf(':')!==-1).map(p => {
            const sep = p.indexOf(':');
            const nombre = p.substring(0,sep).trim();
            const monto  = parseFloat(p.substring(sep+1).trim())||0;
            return monto > 0 ? `<span style="font-size:9px;background:rgba(251,191,36,0.15);color:var(--amber);border:1px solid rgba(251,191,36,0.35);border-radius:4px;padding:1px 5px;">+${nombre} ${S(monto)}</span>` : '';
          }).join('') + '</div>'
        : '';
      return `<div class="aliado-row" style="flex-direction:column;align-items:stretch;gap:4px;padding:8px 0;">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">

        </div>
        ${avPct < 99.9 ? `<div class="prog-wrap"><div class="prog-bar" style="width:${avPct.toFixed(1)}%;background:${avPct>0?'var(--amber)':'var(--red)'};"></div></div>` : ''}
      </div>`;
    }).join('');
    return `<div class="aliado-card">
      <div class="aliado-hdr" onclick="const b=$('${uid}');b.style.display=b.style.display==='none'?'block':'none'">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span class="aliado-nombre">${nombre}</span>
            <span class="${tipoBadgeClass(d.tipo)}" style="font-size:9px;">${d.tipo}</span>
          </div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">${d.movs.length} mov${d.movs.length>1?'s':''} · Total ${S(d.total)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          ${isPend
            ? `<div style="font-size:14px;font-weight:900;color:var(--red);">${S(d.pendiente)}</div><div style="font-size:9px;color:var(--text-muted);">pendiente</div>`
            : `<div style="font-size:13px;font-weight:800;color:var(--green);">✓ Cobrado</div>`

  : '<div style="color:var(--text-muted);font-size:13px;padding:6px 0;">Sin movimientos cobrables este día.</div>';

  // ── Comisionados ─────────────────────────────────────────────
  const comHtml = comArr.length > 0 ? `
  <div style="overflow-x:auto;">

      <tr>
        <td colspan="4" style="color:var(--text-muted);font-weight:800;">TOTAL A PAGAR</td>
        <td colspan="2" style="text-align:right;font-weight:900;color:var(--red);">${S(totalDebeComis)}</td>
      </tr>
    </tfoot>
  </table>
  </div>` : (comArr.length === 0 && Object.keys(comMap).length === 0
    ? '<div style="color:var(--text-muted);font-size:13px;padding:6px 0;">Sin comisionados hoy.</div>'
    : '<div style="color:var(--green);font-size:13px;font-weight:700;padding:6px 0;">✓ Comisiones al día</div>');

  // ── Operaciones + Manifiesto fusionados ──────────────────────
  const opsManifHtml = ops.length > 0 ? ops.map(op => {
    const est = String(op.estado||'').toLowerCase();
    const cls  = est.includes('viaje')||est.includes('activ')||est.includes('abierta') ? 'op-viaje'
               : est.includes('cerr') ? 'op-cerrada' : est.includes('cancel') ? 'op-cancelada' : '';
    const estIcon = est.includes('cerr')||est.includes('pasad') ? '<span style="color:var(--green)">✓</span>'
                  : est.includes('viaje')||est.includes('abierta') ? '<span style="color:var(--amber)">▶</span>'
                  : '<span style="color:var(--text-muted)">●</span>';
    const ocupPct = op.capacidad > 0 ? pct(op.pax_total, op.capacidad) : 0;
    const barColor = ocupPct >= 90 ? 'var(--red)' : ocupPct >= 70 ? 'var(--amber)' : 'var(--green)';
    const chips = Object.entries(op.tipo_chips||{}).map(([t,n]) =>
      `<span class="type-chip ${tipoBadgeClass(t)}">${t} ×${n}</span>`).join('');
    const movs = (op.movimientos||[]).filter(m => m.estado !== 'Cancelado');
    const movsCan = (op.movimientos||[]).filter(m => m.estado === 'Cancelado');
    const manifRows = movs.map(m => {
      const mAdics = adicsSum(m);
      const mTot   = (parseFloat(m.monto_total)||0) + mAdics;
      const adicsChips = mAdics > 0
        ? '<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;">' +
          String(m.adicionales||'').split(',').filter(p=>p.indexOf(':')!==-1).map(p=>{
            const sep=p.indexOf(':'), nombre=p.substring(0,sep).trim(), val=parseFloat(p.substring(sep+1).trim())||0;
            return val>0?`<span style="font-size:8px;background:rgba(251,191,36,0.15);color:var(--amber);border:1px solid rgba(251,191,36,0.35);border-radius:3px;padding:0 4px;">+${nombre} ${S(val)}</span>`:'';
          }).join('') + '</div>'
        : '';
      return `
      <div class="mov-row" style="flex-direction:column;align-items:stretch;gap:2px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
          <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">

          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">

        </div>
        ${adicsChips}
      </div>`;
    }).join('');
    const canRows = movsCan.map(m => `
      <div class="mov-row mov-cancelado">
        <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">
          <span class="${tipoBadgeClass(m.tipo)}" style="flex-shrink:0;">${m.tipo}</span>
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.nombre_contacto}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
          <span style="font-size:11px;color:var(--text-muted);">${m.cant_pax} pax · Cancelado</span>
        </div>
      </div>`).join('');
    const totalPax   = movs.reduce((s,m)=>s+(parseFloat(m.cant_pax)||0),0);
    const totalMonto = movs.reduce((s,m)=>s+movTotal(m),0);
    return `
    <div class="op-card ${cls}">
      <div class="op-row">
        <span class="op-nombre">${op.nombre_bote||op.id_bote}</span>
        ${estIcon}
        <span style="font-size:13px;font-weight:800;color:var(--gold);flex-shrink:0;">${S(op.ingresos_operador)}</span>

        <span style="color:var(--gold);font-weight:700;">${op.pax_total}${op.capacidad>0?' / '+op.capacidad:''} pax</span>

        <span>${op.destino?op.destino+' · ':''}🕐 ${op.hora_salida||'—'}</span>
        ${op.deuda_comisionados>0?`<span style="color:var(--amber);font-size:10px;">Comis. ${S(op.deuda_comisionados)}</span>`:''}

      ${op.capacidad > 0 ? `
      <div class="occ-bar-wrap">

      ${chips ? `<div class="type-chips" style="margin-bottom:4px;">${chips}</div>` : ''}
      ${movs.length > 0 || movsCan.length > 0 ? `
      <div style="margin-top:10px;border-top:1px solid var(--border);">
        ${manifRows}
        ${canRows}
        <div class="mov-total">
          <span style="color:var(--text-muted);">${totalPax} pax</span>
          <span style="color:var(--gold);">S/ ${fmt(totalMonto)}</span>
        </div>
      </div>` : ''}
    </div>`;
  }).join('') : '<div style="color:var(--text-muted);font-size:13px;padding:6px 0;">Sin operaciones este día.</div>';

  // ── Tabla de pasados (PaseOut) dentro de Operaciones del día ──
  const pasadosAll = allMovs.filter(m =>
    m.estado !== 'Cancelado' &&
    (String(m.estado).toLowerCase().includes('pasad') || m.id_contacto_pase)
  );
  const pasadosHtml = pasadosAll.length > 0 ? `
  <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:10px;">
    <div style="font-size:11px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">
      🔀 Pasados a aliados (${pasadosAll.length})
    </div>
    <div style="overflow-x:auto;">
    <table class="pend-table">
      <thead><tr>
        <th>Cliente</th>
        <th>Destino</th>
        <th style="text-align:right">PAX</th>
        <th style="text-align:right">Base</th>
        <th style="text-align:right">Adicionales</th>
        <th style="text-align:right">Total</th>
      </tr></thead>
      <tbody>
      ${pasadosAll.map(m => {
        const mBase  = parseFloat(m.monto_total)||0;
        const mAdics = adicsSum(m);
        const mTot   = mBase + mAdics;
        const aliado = m.nombre_contacto_pase || m.id_contacto_pase || '—';
        const adicsDetail = m.adicionales
          ? String(m.adicionales).split(',').filter(p=>p.indexOf(':')!==-1).map(p=>{
              const sep=p.indexOf(':');
              return `<span style="font-size:9px;background:rgba(251,191,36,0.12);color:var(--amber);border:1px solid rgba(251,191,36,0.3);border-radius:3px;padding:0 4px;margin-right:2px;">${p.substring(0,sep).trim()} ${S(parseFloat(p.substring(sep+1).trim())||0)}</span>`;
            }).join('')
          : '<span style="color:var(--text-muted);font-size:10px;">—</span>';
        return `<tr>
          <td style="font-weight:700;color:${contactColor(m.tipo||'')}">${m.nombre_contacto||'—'}</td>
          <td style="font-size:11px;color:var(--text-muted);">${aliado}</td>
          <td style="text-align:right;color:var(--text-muted);">${m.cant_pax}</td>

          <td style="text-align:right;">${adicsDetail}</td>
          <td style="text-align:right;font-weight:800;color:var(--gold);">${mTot>0?S(mTot):'<span style="color:var(--text-muted)">—</span>'}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
    </div>
  </div>` : '';

  // ── Matrix PAX × ciclo ────────────────────────────────────────
  const matrixHtml = Object.keys(paxMatrix).length > 0 ? `
  <div class="glass" style="padding:14px;margin-bottom:14px;">
    <div class="sec-hdr">📊 Mix PAX — tipo × ciclo</div>
    <div style="overflow-x:auto;">
    <table class="mx-table">
      <thead>
        <tr>
          <th style="text-align:left;">Tipo</th>
          <th>🛥 Embarcado</th>
          <th>✕ Cancelado</th>
          <th>🔀 Pasado</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        ${Object.entries(paxMatrix).sort((a,b)=>a[0].localeCompare(b[0])).map(([tipo,v]) => {
          const tot = v.emb+v.can+v.pas;
          return `<tr>
            <td><span class="${tipoBadgeClass(tipo)}">${tipo}</span></td>
            <td class="${v.emb>0?'v':''}">${v.emb>0?v.emb:'—'}</td>

            <td class="${v.pas>0?'v':''}" style="${v.pas>0?'color:var(--amber);':''}">${v.pas>0?v.pas:'—'}</td>
            <td style="color:var(--gold)">${tot}</td>

        }).join('')}
      </tbody>
      <tfoot>
        <tr>
          <td>Total</td>
          <td>${Object.values(paxMatrix).reduce((s,v)=>s+v.emb,0)||'—'}</td>

          <td style="color:var(--amber);">${Object.values(paxMatrix).reduce((s,v)=>s+v.pas,0)||'—'}</td>
          <td>${Object.values(paxMatrix).reduce((s,v)=>s+v.emb+v.can+v.pas,0)}</td>
        </tr>
      </tfoot>

    </div>

  // ── Caja historial ────────────────────────────────────────────
  const ingTotal = allCaja.filter(c=>isIngreso(c)).reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
  const salTotal = allCaja.filter(c=>!isIngreso(c)).reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
  const cajaHtml = allCaja.length > 0 ? `

  // ── Ensamblar todo ────────────────────────────────────────────
  $('root').innerHTML = `
  <div class="rpt-header">
    <div>
      <div class="rpt-logo shimmer">PS</div>
      <div style="font-size:11px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;">Reporte de Lanchas</div>

  <div class="btn-bar no-print">
    <button class="btn btn-wa" onclick="whatsappShare()">💬 WhatsApp</button>
    <button class="btn" style="background:rgba(74,222,128,0.12);color:var(--green);border-color:rgba(74,222,128,0.3);" onclick="window.open('./ticket.html?fecha='+fecha,'_blank')">🎫 Ticket</button>
    <button class="btn btn-print" onclick="window.print()">🖨 Imprimir</button>
  </div>

  ${alertaHtml}

  ${aliadoArr.length > 0 ? `
  <div class="section glass" style="padding:14px;margin-bottom:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,0.2);margin-bottom:10px;">
      <div class="sec-hdr" style="margin:0;border:none;padding:0;">🤝 Balance de Aliados</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${netDeboPases > 0 ? `<span style="background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;">↑ Debo ${netDeboPases} PAX</span>` : ''}
        ${netMeDebenPases > 0 ? `<span style="background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.3);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;">↓ Me deben ${netMeDebenPases} PAX</span>` : ''}
        ${netDeboPases === 0 && netMeDebenPases === 0 ? `<span style="background:rgba(255,255,255,0.06);color:var(--text-muted);border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">= Tablas</span>` : ''}

  </div>` : ''}

  <div class="section glass" style="padding:14px;margin-bottom:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,0.2);margin-bottom:10px;">
      <div class="sec-hdr" style="margin:0;border:none;padding:0;">💰 Plata que debo cobrar</div>
      <div>
        ${totalMeDebenDinero > 0
          ? `<span style="background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;">Me deben: ${S(totalMeDebenDinero)}</span>`
          : `<span style="background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.3);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">✓ Todo cobrado</span>`
        }
      </div>
    </div>
    ${cobrosClientHtml}
  </div>

  <div class="section glass" style="padding:14px;margin-bottom:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,0.2);margin-bottom:10px;">
      <div class="sec-hdr" style="margin:0;border:none;padding:0;">👥 Plata que DEBO · Comisionados</div>
      <div>
        ${totalDebeComis > 0
          ? `<span style="background:rgba(251,191,36,0.1);color:var(--amber);border:1px solid rgba(251,191,36,0.3);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;">${S(totalDebeComis)} pendiente</span>`
          : (comArr.length > 0 ? `<span style="background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.3);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;">✓ Comisiones al día</span>` : '')
        }
      </div>
    </div>
    ${comHtml}
  </div>

  ${kpiHtml}

  <div class="section glass" style="padding:14px;margin-bottom:14px;">
    <div class="sec-hdr">⛵ Operaciones del día (${ops.length})</div>
    ${opsManifHtml}
    ${pasadosHtml}
  </div>

  ${matrixHtml}

  <div class="section">
    <div class="sec-hdr" style="margin-bottom:10px;">📒 Caja del día</div>

  </div>

  <div style="text-align:center;padding:20px 0 8px;font-size:11px;color:var(--text-muted);">

  <div style="opacity:0.4;filter:grayscale(1);pointer-events:none;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px dashed rgba(255,255,255,0.2);border-radius:10px;">
      <span style="font-size:16px;">🚧</span>
      <span style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.08em;">Pendiente de editar</span>
    </div>
    ${flujoHtml}
    <div class="charts-grid">
      <div class="chart-card glass">
        <div class="chart-title">PAX en mis botes <span style="font-size:8px;font-weight:400;opacity:.6;">(excluye PaseOut)</span></div>
        <div class="chart-wrap"><canvas id="chartTipo"></canvas></div>
      </div>
      <div class="chart-card glass">
        <div class="chart-title">💳 Ingresos por método de pago</div>
        <div class="chart-wrap"><canvas id="chartMetodo"></canvas></div>
      </div>
      <div class="chart-card glass">
        <div class="chart-title">⛵ Ocupación por bote</div>
        <div class="chart-wrap"><canvas id="chartOcupacion"></canvas></div>
      </div>
      ${Object.keys(adicsTypeMap).length > 0 ? `
      <div class="chart-card glass">
        <div class="chart-title">➕ Adicionales cobrados por tipo</div>
        <div class="chart-wrap"><canvas id="chartAdicionales"></canvas></div>
      </div>` : ''}
      ${aliadoArr.length > 1 ? `
      <div class="chart-card glass">
        <div class="chart-title">Balance de pases por aliado</div>
        <div class="chart-wrap"><canvas id="chartAliados"></canvas></div>

  startCountdown();
  buildCharts(data, tipoIngMap, metMap, paxEnBotesMap, adicsTypeMap);
}

// ── Charts ──────────────────────────────────────────────────────
function buildCharts(data, tipoIngMap, metMap, paxEnBotesMap, adicsTypeMap) {
  const ops    = data.operaciones || [];
  const copts  = { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{ color:'#f0e6d3', font:{ size:10 }, boxWidth:10 } } } };
  const scOpts = { ticks:{ color:'#8a7060', font:{ size:10 } }, grid:{ color:'rgba(255,255,255,0.04)' } };
  const colors = ['#4ade80','#60a5fa','#fbbf24','#f0abfc','#fb923c','#a78bfa','#34d399','#f87171'];
  const S2 = v => 'S/'+Number(v).toLocaleString('es-PE',{minimumFractionDigits:0,maximumFractionDigits:0});

  // Donut: PAX en mis botes
  const paxKeys = Object.keys(paxEnBotesMap||{}).filter(k => paxEnBotesMap[k] > 0);
  if (paxKeys.length && $('chartTipo')) {
    charts.tipo = new Chart($('chartTipo'), {
      type:'doughnut',
      data:{ labels:paxKeys, datasets:[{ data:paxKeys.map(k=>paxEnBotesMap[k]), backgroundColor:paxKeys.map((_,i)=>colors[i%colors.length]), borderWidth:0 }] },
      options:{ ...copts, cutout:'60%', plugins:{ ...copts.plugins, tooltip:{ callbacks:{ label: ctx => ` ${ctx.label}: ${ctx.raw} PAX` } } } }
    });
  }

  // Barras horizontales: ingresos por método con monto en tooltip y etiqueta
  const metKeys = Object.keys(metMap).filter(k=>metMap[k].ing>0);
  if (metKeys.length && $('chartMetodo')) {
    charts.metodo = new Chart($('chartMetodo'), {
      type:'bar',
      data:{ labels:metKeys, datasets:[{
        label:'Ingresado',
        data:metKeys.map(k=>metMap[k].ing),
        backgroundColor:metKeys.map((_,i)=>colors[i%colors.length]),
        borderRadius:5
      }]},
      options:{ ...copts, indexAxis:'y',
        scales:{ x:{ ...scOpts, ticks:{ ...scOpts.ticks, callback: v=>S2(v) } }, y:{ ...scOpts } },
        plugins:{ ...copts.plugins, tooltip:{ callbacks:{ label: ctx => ` ${S2(ctx.raw)}` } } }
      }
    });
  }

  // Barras horizontales: ocupación por bote — color según % de llenado
  if (ops.length && $('chartOcupacion')) {
    const labels = ops.map(o=>o.nombre_bote||o.id_bote);
    const ocupColors = ops.map(o => {
      if (!o.capacidad) return 'rgba(201,168,76,0.7)';
      const pct = o.pax_total / o.capacidad;
      return pct >= 0.9 ? 'rgba(248,113,113,0.8)' : pct >= 0.6 ? 'rgba(251,191,36,0.8)' : 'rgba(74,222,128,0.75)';
    });
    charts.ocup = new Chart($('chartOcupacion'), {
      type:'bar',
      data:{ labels, datasets:[
        { label:'Ocupados', data:ops.map(o=>o.pax_total), backgroundColor:ocupColors, borderRadius:4 },
        { label:'Libre',    data:ops.map(o=>Math.max(0,(o.capacidad||0)-o.pax_total)), backgroundColor:'rgba(255,255,255,0.06)', borderRadius:4 }
      ]},
      options:{ ...copts, indexAxis:'y', scales:{
        x:{ ...scOpts, stacked:true, grid:{ display:false } },
        y:{ ...scOpts, stacked:true }
      }, plugins:{ ...copts.plugins, tooltip:{ callbacks:{
        label: ctx => ctx.dataset.label==='Ocupados'
          ? ` ${ctx.raw} PAX ocupados${ops[ctx.dataIndex]?.capacidad?' / '+ops[ctx.dataIndex].capacidad:''}`
          : ` ${ctx.raw} PAX libres`
      }}}}
    });
  }

  // Barras: adicionales cobrados por tipo
  const adicsKeys = Object.keys(adicsTypeMap||{}).sort((a,b)=>adicsTypeMap[b]-adicsTypeMap[a]);
  if (adicsKeys.length && $('chartAdicionales')) {
    charts.adics = new Chart($('chartAdicionales'), {
      type:'bar',
      data:{ labels:adicsKeys, datasets:[{
        label:'Total cobrado',
        data:adicsKeys.map(k=>adicsTypeMap[k]),
        backgroundColor:adicsKeys.map((_,i)=>colors[i%colors.length]),
        borderRadius:5
      }]},
      options:{ ...copts, indexAxis:'y',
        scales:{ x:{ ...scOpts, ticks:{ ...scOpts.ticks, callback: v=>S2(v) } }, y:{ ...scOpts } },
        plugins:{ ...copts.plugins, tooltip:{ callbacks:{ label: ctx => ` ${S2(ctx.raw)}` } } }
      }
    });
  }

  // Barras apiladas: aliados (out vs in)
  if ($('chartAliados')) {
    const aliadoMap2 = {};
    (data.operaciones||[]).forEach(op=>(op.movimientos||[]).forEach(m=>{
      if (m.estado==='Cancelado') return;
      if (m.id_contacto_pase) {
        const k = m.nombre_contacto_pase||m.id_contacto_pase;
        if (!aliadoMap2[k]) aliadoMap2[k]={out:0,in:0};
        aliadoMap2[k].out += parseInt(m.cant_pax)||0;
      }
      if (m.tipo==='Aliado(PaseIn)'||m.tipo==='Pase_Recibido') {
        const k = m.nombre_contacto||m.id_contacto;
        if (!aliadoMap2[k]) aliadoMap2[k]={out:0,in:0};
        aliadoMap2[k].in += parseInt(m.cant_pax)||0;
      }
    }));
    const aKeys = Object.keys(aliadoMap2);
    if (aKeys.length) {
      charts.aliados = new Chart($('chartAliados'), {
        type:'bar',
        data:{ labels:aKeys, datasets:[
          { label:'Enviados ↑', data:aKeys.map(k=>aliadoMap2[k].out), backgroundColor:'rgba(248,113,113,0.65)', borderRadius:4 },
          { label:'Recibidos ↓', data:aKeys.map(k=>aliadoMap2[k].in), backgroundColor:'rgba(74,222,128,0.55)', borderRadius:4 }
        ]},
        options:{ ...copts, indexAxis:'y', scales:{
          x:{ ...scOpts, grid:{ color:'rgba(255,255,255,0.04)' } },
          y:{ ...scOpts }
        } }
      });
    }
  }
}

// ── Error ────────────────────────────────────────────────────────
function renderError(msg) {
  $('root').innerHTML = `
  <div style="text-align:center;padding:80px 20px;color:var(--text-muted);">
    <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
    <p style="font-size:14px;">${msg}</p>
    <button onclick="loadData()" style="margin-top:20px;padding:10px 24px;background:rgba(123,32,48,0.3);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;font-size:14px;">
      Reintentar
    </button>
  </div>`;
}

if (!API_URL) {
  renderError('No se encontró la URL del servidor. Abre el reporte desde el panel PS.');
} else {
  loadData();
}
</script>
