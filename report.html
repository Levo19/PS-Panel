<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reporte Lanchas · PS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root {
  --guinda: #7B2030; --guinda-dark: #5a1722; --guinda-light: #9d2a3e;
  --gold: #C9A84C; --gold-light: #e8c46a; --gold-dark: #a88835;
  --bg: #0e0608; --surface: rgba(255,255,255,0.04);
  --border: rgba(201,168,76,0.18); --text: #f0e6d3;
  --text-muted: rgba(240,230,211,0.55);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }

.shimmer {
  background: linear-gradient(90deg,var(--gold-dark),var(--gold-light),var(--gold),var(--gold-light),var(--gold-dark));
  background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite;
}
@keyframes shimmer { to { background-position: 200% center; } }
.glass { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; }

/* Header */
.report-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
.report-logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
.report-fecha { font-size: 16px; font-weight: 700; }
.report-refresh { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.countdown { color: var(--gold); font-weight: 700; }

/* Buttons */
.btn-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.btn { padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.btn-wa  { background: rgba(37,211,102,0.15); color: #25d366; border-color: rgba(37,211,102,0.3); }
.btn-print { background: var(--surface); color: var(--text-muted); }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 10px; margin-bottom: 20px; }
.kpi-card { padding: 14px; position: relative; overflow: hidden; }
.kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); opacity:0.5; }
.kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 6px; }
.kpi-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

/* Charts */
.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 14px; margin-bottom: 20px; }
.chart-card { padding: 16px; }
.chart-title { font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.chart-wrap { position: relative; height: 190px; }

/* Section */
.section { margin-bottom: 14px; }
.section-title { font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; padding-bottom: 7px; border-bottom: 1px solid rgba(201,168,76,0.2); }

/* Op cards */
.op-card { border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; background: rgba(255,255,255,0.02); }
.op-card.op-cerrada { border-color: rgba(100,100,100,0.25); }
.op-card.op-activa  { border-color: rgba(74,222,128,0.35); }
.op-card.op-viaje   { border-color: rgba(251,191,36,0.35); }
.op-row1 { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.op-nombre { font-size:14px; font-weight:800; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.op-row2, .op-row3 { display:flex; justify-content:space-between; align-items:center; font-size:11px; color:var(--text-muted); margin-bottom:3px; }
.type-chips { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }
.type-chip  { font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; }

/* Tipo badges */
.tipo-badge { padding:2px 7px; border-radius:4px; font-size:10px; font-weight:700; }
.tipo-Directo     { background:rgba(34,197,94,0.15);  color:#4ade80; }
.tipo-Agencia     { background:rgba(99,179,237,0.15); color:#90cdf4; }
.tipo-Comisionado { background:rgba(167,139,250,0.15);color:#a78bfa; }
.tipo-PaseIN        { background:rgba(251,191,36,0.15); color:#fbbf24; }
.tipo-PaseOUT       { background:rgba(251,146,60,0.15); color:#fb923c; }
.tipo-Aliado        { background:rgba(240,171,252,0.15);color:#f0abfc; }
.tipo-AliadoPaseOut { background:rgba(240,171,252,0.15);color:#f0abfc; }

/* Manifiesto card rows */
.mov-row { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:8px 10px; border-radius:8px; border-bottom:1px solid rgba(255,255,255,0.04); }
.mov-row:last-child { border-bottom:none; }
.mov-total { display:flex; justify-content:space-between; padding:8px 10px; border-top:1px solid var(--border); margin-top:2px; font-size:12px; font-weight:800; }

/* Caja rows */
.caja-row { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:10px 12px; border-radius:8px; margin-bottom:4px; }
.caja-ingreso { background:rgba(74,222,128,0.07);  border-left:3px solid rgba(74,222,128,0.45); }
.caja-salida  { background:rgba(239,68,68,0.07);   border-left:3px solid rgba(239,68,68,0.35); }
.caja-total   { display:flex; justify-content:space-between; padding:8px 10px; border-top:1px solid var(--border); margin-top:4px; font-size:12px; }

/* Aliados */
.aliado-row { display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:8px; border-bottom:1px solid rgba(255,255,255,0.04); flex-wrap:wrap; }
.aliado-row:last-child { border-bottom:none; }

/* Spinner */
.loading { display:flex; align-items:center; justify-content:center; height:200px; flex-direction:column; gap:16px; }
.spin { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Flujo de Valor */
.flujo-section { padding: 16px; }
.flujo-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.flujo-label { font-size:11px; color:var(--text-muted); width:120px; flex-shrink:0; text-align:right; line-height:1.3; }
.flujo-track { flex:1; height:12px; background:rgba(255,255,255,0.05); border-radius:6px; overflow:hidden; }
.flujo-bar   { height:100%; border-radius:6px; min-width:3px; }
.flujo-value { font-size:12px; font-weight:800; width:88px; flex-shrink:0; text-align:right; }
.flujo-sep   { border:none; border-top:1px dashed rgba(201,168,76,0.2); margin:8px 0 8px 128px; }

/* PAX Matrix */
.matrix-table { width:100%; font-size:11px; border-collapse:collapse; }
.matrix-table th { color:var(--gold); font-weight:700; padding:5px 8px; text-align:right; border-bottom:1px solid var(--border); }
.matrix-table th:first-child { text-align:left; }
.matrix-table td { padding:5px 8px; text-align:right; border-bottom:1px solid rgba(255,255,255,0.03); color:var(--text-muted); }
.matrix-table td:first-child { text-align:left; }
.matrix-table td.v { color:var(--text); font-weight:700; }
.matrix-table tfoot td { border-top:1px solid var(--border); color:var(--gold); font-weight:800; }

/* Mobile */
@media (max-width:600px) {
  body { padding: 10px; }
  .kpi-grid { grid-template-columns: repeat(2,1fr); gap:8px; }
  .kpi-value { font-size:18px; }
  .charts-grid { grid-template-columns: 1fr; }
  .chart-wrap { height:160px; }
  .report-header { flex-direction:column; gap:6px; align-items:flex-start; }
  .flujo-label { width:90px; font-size:10px; }
  .flujo-value { width:75px; font-size:11px; }
  .flujo-sep { margin-left:98px; }
}

/* Print */
@media print {
  body { background:#fff; color:#000; padding:12px; }
  .btn-bar { display:none !important; }
  .glass { background:#f9f9f9; border:1px solid #ddd; }
  .shimmer { -webkit-text-fill-color:#7B2030 !important; background:none !important; animation:none !important; }
  .kpi-value, .op-nombre { color:#000 !important; }
  .kpi-label, .kpi-sub, .chart-title, .section-title { color:#555 !important; }
  .op-card { border:1px solid #ccc !important; background:#fff !important; }
  .tipo-badge { border:1px solid #ccc !important; background:#f0f0f0 !important; color:#333 !important; }
  .caja-ingreso, .caja-salida { background:#f9f9f9 !important; border-left:3px solid #ccc !important; }
  .charts-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<div id="root">
  <div class="loading"><div class="spin"></div><div style="color:var(--text-muted);font-size:13px;">Cargando reporte...</div></div>
</div>

<script>
const params  = new URLSearchParams(location.search);
const fecha   = params.get('fecha') || new Date().toISOString().slice(0,10);
const API_URL = params.get('api') || localStorage.getItem('ps_api_url') || '';
const REFRESH = 60;
let countdown = REFRESH;
let timer     = null;
let charts    = {};

function fmt(v) { return (parseFloat(v)||0).toLocaleString('es-PE',{minimumFractionDigits:0,maximumFractionDigits:0}); }

function tipoBadgeClass(tipo) { return 'tipo-' + String(tipo||'').replace(/[^a-zA-Z0-9]/g,''); }

function getColor(tipo) {
  const t = String(tipo||'').toLowerCase();
  if (t.includes('directo'))               return '#4ade80';
  if (t.includes('agencia'))               return '#60a5fa';
  if (t.includes('comisionado'))           return '#a78bfa';
  if (t.includes('pasein'))                return '#fbbf24';
  if (t.includes('aliado')||t.includes('paseout')) return '#f0abfc';
  return '#888888';
}

function contactColor(tipo) {
  const t = String(tipo||'').toLowerCase();
  if (t.includes('agencia'))               return '#60a5fa';
  if (t.includes('comisionado'))           return '#fbbf24';
  if (t.includes('aliado')||t.includes('paseout')) return '#f0abfc';
  if (t.includes('pase'))                  return '#fb923c';
  return '#4ade80';
}

function estadoIcon(estado) {
  const s = String(estado||'').toLowerCase();
  if (s.includes('cancel'))                    return '<span style="color:#6b7280;font-weight:900;">✕</span>';
  if (s.includes('cerr')||s.includes('pasad')) return '<span style="color:#4ade80;font-weight:900;">✓</span>';
  if (s.includes('viaje'))                     return '<span style="color:#fbbf24;font-weight:900;">▶</span>';
  return '<span style="color:rgba(240,230,211,0.4);">●</span>';
}

function opCardClass(estado) {
  const s = String(estado||'').toLowerCase();
  if (s.includes('cerr')||s.includes('pasad')) return 'op-cerrada';
  if (s.includes('viaje'))                     return 'op-viaje';
  return 'op-activa';
}

function montoPayStyle(op, mov) {
  const paid = (op.caja||[]).filter(c => String(c.id_movimiento||'') === String(mov.id_mov||'')).reduce((s,c) => s+(parseFloat(c.monto)||0), 0);
  const total = parseFloat(mov.monto_total)||0;
  if (total === 0) return 'color:var(--text-muted)';
  if (paid >= total * 0.99) return 'color:#4ade80';
  if (paid > 0)             return 'color:#fbbf24';
  return 'color:#f87171';
}

function isIngreso(c) {
  const cat = String(c.categoria||'').toLowerCase();
  return cat.includes('cobro') || cat.includes('ingreso') || cat.includes('venta');
}
function metodoIcon(c) {
  const m = String(c.metodo_pago||'').toLowerCase();
  return (m.includes('efect')||m==='cash') ? '💵' : '💳';
}

function fmtFecha(f) {
  const [y,m,d] = f.split('-');
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${d} ${meses[parseInt(m)-1]} ${y}`;
}

async function loadData() {
  try {
    const url = new URL(API_URL);
    url.searchParams.set('accion','lanchas_dia');
    url.searchParams.set('fecha', fecha);
    const r = await fetch(url.toString());
    const json = await r.json();
    if (json.ok) render(json.data);
    else renderError('GAS devolvió error: ' + json.error);
  } catch(e) { renderError('Error de conexión: ' + e.message); }
}

function startCountdown() {
  clearInterval(timer);
  countdown = REFRESH;
  timer = setInterval(() => {
    countdown--;
    const el = document.getElementById('countdown');
    if (el) el.textContent = '0:' + String(countdown).padStart(2,'0');
    if (countdown <= 0) { loadData(); countdown = REFRESH; }
  }, 1000);
}

function whatsappShare() {
  const msg = encodeURIComponent(`📊 Reporte Lanchas ${fmtFecha(fecha)}\n${location.href}`);
  window.open('https://wa.me/?text=' + msg, '_blank');
}

function render(data) {
  const kpis      = data.kpis || {};
  const ops       = data.operaciones || [];
  const pases     = data.pases_sueltos || [];
  const cajaSuelta = data.caja_suelta || [];

  // Todos los pases del día
  const isPase = t => t.includes('Pase') || t.includes('Aliado');
  const allPases = [];
  ops.forEach(op => {
    (op.movimientos||[]).forEach(m => {
      if (isPase(String(m.tipo||'')) && m.estado !== 'Cancelado')
        allPases.push({ ...m, _bote: op.nombre_bote || op.id_bote });
    });
  });
  pases.forEach(m => {
    if (isPase(String(m.tipo||'')) && m.estado !== 'Cancelado')
      allPases.push({ ...m, _bote: '—' });
  });
  const aliados          = allPases.filter(p => String(p.tipo||'').includes('Aliado'));
  const pendienteAliados = aliados.filter(p => !p.id_agencia_comprada).reduce((s,p) => s+(parseFloat(p.monto_total)||0), 0);

  // Toda la caja del día
  const allCaja = [];
  ops.forEach(op => (op.caja||[]).forEach(c => allCaja.push({ ...c, _bote: op.nombre_bote || op.id_bote })));
  cajaSuelta.forEach(c => allCaja.push({ ...c, _bote: '' }));

  // PAX Matrix: tipo comercial × ciclo de vida
  const paxMatrix = {};
  ops.forEach(op => {
    (op.movimientos||[]).forEach(m => {
      const t = String(m.tipo||'?');
      if (!paxMatrix[t]) paxMatrix[t] = {emb:0, can:0, pas:0};
      if (m.estado === 'Cancelado') paxMatrix[t].can += parseFloat(m.cant_pax)||0;
      else                          paxMatrix[t].emb += parseFloat(m.cant_pax)||0;
    });
  });
  pases.forEach(p => {
    const t = String(p.tipo||'?');
    if (!paxMatrix[t]) paxMatrix[t] = {emb:0, can:0, pas:0};
    if (p.estado === 'Cancelado') paxMatrix[t].can += parseFloat(p.cant_pax)||0;
    else                          paxMatrix[t].pas += parseFloat(p.cant_pax)||0;
  });

  // Flujo de Valor
  const brutoTotal  = (kpis.ingresos_operador||0) + (kpis.deuda_comisionados||0);
  const netoEmpresa = kpis.ingresos_operador||0;
  const deudaComis  = kpis.deuda_comisionados||0;
  let paseINdeuda   = 0;
  ops.forEach(op => (op.movimientos||[]).forEach(m => {
    if (String(m.tipo||'').toLowerCase().includes('pasein') && m.estado !== 'Cancelado')
      paseINdeuda += parseFloat(m.monto_total)||0;
  }));
  pases.forEach(p => {
    if (String(p.tipo||'').toLowerCase().includes('pasein') && p.estado !== 'Cancelado')
      paseINdeuda += parseFloat(p.monto_total)||0;
  });
  const maxFlujo = Math.max(brutoTotal, pendienteAliados, paseINdeuda, 1);
  const fw = v => Math.min(100, Math.max(1.5, v/maxFlujo*100)).toFixed(1);

  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const html = `
    <!-- Header -->
    <div class="report-header">
      <div>
        <div class="report-logo shimmer">PS</div>
        <div style="font-size:12px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;">Reporte de Lanchas</div>
      </div>
      <div>
        <div class="report-fecha">📅 ${fmtFecha(fecha)}</div>
        <div class="report-refresh">Actualiza en <span class="countdown" id="countdown">1:00</span></div>
      </div>
    </div>

    <div class="btn-bar no-print">
      <button class="btn btn-wa" onclick="whatsappShare()">💬 WhatsApp</button>
      <button class="btn btn-print" onclick="window.print()">🖨 Imprimir</button>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card glass">
        <div class="kpi-label">PAX Total</div>
        <div class="kpi-value shimmer">${kpis.pax_total || 0}</div>
        <div class="kpi-sub">${kpis.operaciones_count || 0} operaciones</div>
      </div>
      <div class="kpi-card glass">
        <div class="kpi-label">Ingreso Operador</div>
        <div class="kpi-value" style="color:var(--gold)">S/ ${fmt(kpis.ingresos_operador)}</div>
        <div class="kpi-sub">Neto empresa</div>
      </div>
      <div class="kpi-card glass">
        <div class="kpi-label">Deuda Comisionados</div>
        <div class="kpi-value" style="color:#f87171">S/ ${fmt(kpis.deuda_comisionados)}</div>
      </div>
      <div class="kpi-card glass">
        <div class="kpi-label">💵 Efectivo</div>
        <div class="kpi-value" style="color:#4ade80">S/ ${fmt(kpis.caja_efectivo)}</div>
        <div class="kpi-sub">💳 S/ ${fmt(kpis.caja_transferencia)} transfer.</div>
      </div>
      <div class="kpi-card glass">
        <div class="kpi-label">Pendiente Aliados</div>
        <div class="kpi-value" style="color:#fbbf24">S/ ${fmt(pendienteAliados)}</div>
        <div class="kpi-sub">${aliados.length} pase${aliados.length!==1?'s':''} · ${aliados.filter(p=>p.id_agencia_comprada).length} cobrado${aliados.filter(p=>p.id_agencia_comprada).length!==1?'s':''}</div>
      </div>
    </div>

    <!-- Flujo de Valor -->
    <div class="flujo-section glass" style="margin-bottom:14px;">
      <div class="section-title" style="margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid rgba(201,168,76,0.2);">💹 Flujo de Valor</div>
      <div class="flujo-row">
        <span class="flujo-label">Bruto cobrado</span>
        <div class="flujo-track"><div class="flujo-bar" style="width:100%;background:rgba(201,168,76,0.45);"></div></div>
        <span class="flujo-value" style="color:var(--gold)">S/ ${fmt(brutoTotal)}</span>
      </div>
      ${deudaComis > 0 ? `
      <div class="flujo-row">
        <span class="flujo-label" style="color:#f87171;">− Deuda comis.</span>
        <div class="flujo-track"><div class="flujo-bar" style="width:${fw(deudaComis)}%;background:rgba(248,113,113,0.5);"></div></div>
        <span class="flujo-value" style="color:#f87171">−S/ ${fmt(deudaComis)}</span>
      </div>` : ''}
      <hr class="flujo-sep">
      <div class="flujo-row">
        <span class="flujo-label" style="color:#4ade80;font-weight:700;">= Neto empresa</span>
        <div class="flujo-track"><div class="flujo-bar" style="width:${fw(netoEmpresa)}%;background:rgba(74,222,128,0.5);"></div></div>
        <span class="flujo-value" style="color:#4ade80;font-size:14px;">S/ ${fmt(netoEmpresa)}</span>
      </div>
      ${pendienteAliados > 0 ? `
      <hr class="flujo-sep">
      <div class="flujo-row">
        <span class="flujo-label" style="color:#fbbf24;">⏳ Cob. aliados</span>
        <div class="flujo-track"><div class="flujo-bar" style="width:${fw(pendienteAliados)}%;background:rgba(251,191,36,0.45);"></div></div>
        <span class="flujo-value" style="color:#fbbf24">S/ ${fmt(pendienteAliados)}</span>
      </div>` : ''}
      ${paseINdeuda > 0 ? `
      <div class="flujo-row">
        <span class="flujo-label" style="color:#fb923c;">↩ Deb. aliados</span>
        <div class="flujo-track"><div class="flujo-bar" style="width:${fw(paseINdeuda)}%;background:rgba(251,146,60,0.4);"></div></div>
        <span class="flujo-value" style="color:#fb923c">S/ ${fmt(paseINdeuda)}</span>
      </div>` : ''}
    </div>

    <!-- Gráficos -->
    <div class="charts-grid">
      <div class="chart-card glass">
        <div class="chart-title">PAX por tipo</div>
        <div class="chart-wrap"><canvas id="chartDonut"></canvas></div>
      </div>
      <div class="chart-card glass">
        <div class="chart-title">Ingreso por bote</div>
        <div class="chart-wrap"><canvas id="chartBotes"></canvas></div>
      </div>
      <div class="chart-card glass">
        <div class="chart-title">Cobrado vs Deuda</div>
        <div class="chart-wrap"><canvas id="chartStack"></canvas></div>
      </div>
    </div>

    <!-- Mix PAX × Ciclo -->
    ${Object.keys(paxMatrix).length > 0 ? `
    <div class="section glass" style="padding:16px;margin-bottom:14px;">
      <div class="section-title">📊 Mix PAX — tipo × ciclo</div>
      <table class="matrix-table">
        <thead>
          <tr>
            <th>Tipo comercial</th>
            <th>🛥 Embarcado</th>
            <th>✕ Cancelado</th>
            <th>🔀 Pasado</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          ${Object.entries(paxMatrix).sort((a,b)=>a[0].localeCompare(b[0])).map(([tipo,v]) => {
            const tot = v.emb + v.can + v.pas;
            return `<tr>
              <td><span class="tipo-badge ${tipoBadgeClass(tipo)}" style="font-size:9px;">${tipo}</span></td>
              <td class="${v.emb>0?'v':''}">${v.emb>0?v.emb:'—'}</td>
              <td class="${v.can>0?'v':''}" style="${v.can>0?'color:#f87171;':''}">${v.can>0?v.can:'—'}</td>
              <td class="${v.pas>0?'v':''}" style="${v.pas>0?'color:#fbbf24;':''}">${v.pas>0?v.pas:'—'}</td>
              <td style="color:var(--gold)">${tot}</td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td>Total</td>
            <td>${Object.values(paxMatrix).reduce((s,v)=>s+v.emb,0)||'—'}</td>
            <td style="color:#f87171;">${Object.values(paxMatrix).reduce((s,v)=>s+v.can,0)||'—'}</td>
            <td style="color:#fbbf24;">${Object.values(paxMatrix).reduce((s,v)=>s+v.pas,0)||'—'}</td>
            <td>${Object.values(paxMatrix).reduce((s,v)=>s+v.emb+v.can+v.pas,0)}</td>
          </tr>
        </tfoot>
      </table>
    </div>` : ''}

    <!-- Operaciones (cards) -->
    <div class="section glass" style="padding:16px;margin-bottom:14px;">
      <div class="section-title">Operaciones del día</div>
      ${ops.length === 0
        ? '<p style="color:var(--text-muted);font-size:13px;">Sin operaciones</p>'
        : ops.map(op => `
          <div class="op-card ${opCardClass(op.estado)}">
            <!-- Fila 1: nombre · estado · descuadre | monto -->
            <div class="op-row1">
              <span class="op-nombre">${op.nombre_bote || op.id_bote}</span>
              ${estadoIcon(op.estado)}
              ${op.descuadre ? '<span style="color:#ef4444;font-size:13px;" title="Descuadre">💰</span>' : ''}
              <span style="font-size:13px;font-weight:800;color:var(--gold);flex-shrink:0;">S/ ${fmt(op.ingresos_operador)}</span>
            </div>
            <!-- Fila 2: capitan · guia | pax -->
            <div class="op-row2">
              <span>${op.nombre_capitan || op.id_capitan}${(op.nombre_guia || op.id_guia) ? ' · ' + (op.nombre_guia || op.id_guia) : ''}</span>
              <span style="color:var(--gold);font-weight:700;">${op.pax_total} pax</span>
            </div>
            <!-- Fila 3: destino · hora -->
            <div class="op-row3">
              <span>${op.destino ? op.destino + ' · ' : ''}🕐 ${op.hora_salida || '—'}</span>
              ${op.deuda_comisionados > 0 ? `<span style="color:#f87171;font-size:10px;">Deuda S/ ${fmt(op.deuda_comisionados)}</span>` : ''}
            </div>
            <!-- Fila 4: tipo chips -->
            ${Object.keys(op.tipo_chips||{}).length ? `
            <div class="type-chips">
              ${Object.entries(op.tipo_chips).map(([t,n]) => `<span class="type-chip ${tipoBadgeClass(t)}">${t} ×${n}</span>`).join('')}
            </div>` : ''}
          </div>
        `).join('')
      }
    </div>

    <!-- Manifiestos -->
    ${ops.map(op => {
      const movs = (op.movimientos||[]).filter(m => m.estado !== 'Cancelado');
      if (!movs.length) return '';
      return `
      <div class="section glass" style="padding:16px;margin-bottom:12px;">
        <div class="section-title">${op.nombre_bote || op.id_bote} — Manifiesto</div>
        ${movs.map(m => `
          <div class="mov-row">
            <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">
              <span class="tipo-badge ${tipoBadgeClass(m.tipo)}" style="flex-shrink:0;font-size:9px;">${m.tipo}</span>
              <span style="font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${contactColor(m.tipo)};">${m.nombre_contacto}</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
              <span style="font-size:12px;color:var(--text-muted);">${m.cant_pax} pax</span>
              <span style="font-size:14px;font-weight:800;${montoPayStyle(op,m)}">S/ ${fmt(m.monto_total)}</span>
            </div>
          </div>
        `).join('')}
        <div class="mov-total">
          <span style="color:var(--text-muted);">${movs.reduce((s,m)=>s+(parseFloat(m.cant_pax)||0),0)} pax total</span>
          <span style="color:var(--gold);">S/ ${fmt(movs.reduce((s,m)=>s+(parseFloat(m.monto_total)||0),0))}</span>
        </div>
      </div>`;
    }).join('')}

    <!-- Aliados -->
    ${aliados.length > 0 ? `
    <div class="section glass" style="padding:16px;margin-bottom:14px;">
      <div class="section-title">Pases de Aliados — Cobros</div>
      ${aliados.map(p => `
        <div class="aliado-row">
          <span class="tipo-badge ${tipoBadgeClass(p.tipo)}" style="flex-shrink:0;">${p.tipo}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:13px;color:#f0abfc;">${p.nombre_contacto}</div>
            ${(p.nombre_contacto_pase || p.id_contacto_pase) ? `<div style="font-size:11px;color:var(--text-muted);">→ ${p.nombre_contacto_pase || p.id_contacto_pase}</div>` : ''}
          </div>
          <span style="font-size:12px;color:var(--text-muted);flex-shrink:0;">${p.cant_pax} pax</span>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:13px;font-weight:800;color:#fbbf24;">S/ ${fmt(p.monto_total)}</div>
            <div style="font-size:11px;">
              ${p.id_agencia_comprada
                ? `<span style="color:#4ade80;font-weight:700;">✓ S/${fmt(p.monto_comprado)}</span>`
                : `<span style="color:#f87171;">⏳ Pendiente</span>`}
            </div>
          </div>
        </div>
      `).join('')}
      <div class="caja-total">
        <span style="color:var(--text-muted);">Total aliados</span>
        <span style="font-weight:800;">
          <span style="color:#fbbf24;">S/ ${fmt(aliados.reduce((s,p)=>s+(parseFloat(p.monto_total)||0),0))}</span>
          &nbsp;·&nbsp;
          <span style="color:#4ade80;">Cobrado S/ ${fmt(aliados.filter(p=>p.id_agencia_comprada).reduce((s,p)=>s+(parseFloat(p.monto_comprado)||0),0))}</span>
        </span>
      </div>
    </div>` : ''}

    <!-- Pases sueltos (no aliados) -->
    ${pases.filter(p => !String(p.tipo||'').includes('Aliado')).length > 0 ? `
    <div class="section glass" style="padding:16px;margin-bottom:14px;">
      <div class="section-title">Pases sin operación asignada</div>
      ${pases.filter(p => !String(p.tipo||'').includes('Aliado')).map(p => `
        <div class="mov-row">
          <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">
            <span class="tipo-badge ${tipoBadgeClass(p.tipo)}" style="flex-shrink:0;font-size:9px;">${p.tipo}</span>
            <span style="font-weight:700;color:${contactColor(p.tipo)};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.nombre_contacto}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
            <span style="font-size:12px;color:var(--text-muted);">${p.cant_pax} pax</span>
            <span style="font-size:14px;font-weight:800;color:var(--gold);">S/ ${fmt(p.monto_total)}</span>
          </div>
        </div>
      `).join('')}
    </div>` : ''}

    <!-- Caja del día -->
    ${allCaja.length > 0 ? `
    <div class="section glass" style="padding:16px;margin-bottom:14px;">
      <div class="section-title">Caja del día (${allCaja.length} registros)</div>
      ${allCaja.map(c => `
        <div class="caja-row ${isIngreso(c)?'caja-ingreso':'caja-salida'}">
          <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
            <span style="font-size:18px;flex-shrink:0;">${metodoIcon(c)}</span>
            <div style="min-width:0;">
              <div style="display:flex;align-items:center;gap:5px;">
                <span style="font-weight:700;font-size:13px;">${c.operador || '—'}</span>
                ${c.comentarios ? '<span style="width:14px;height:14px;border-radius:50%;background:rgba(201,168,76,0.25);color:var(--gold);font-size:8px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;font-style:italic;">i</span>' : ''}
                ${c._bote ? `<span style="font-size:12px;" title="${c._bote}">⛵</span>` : ''}
              </div>
              <div style="font-size:11px;color:var(--text-muted);">${c.categoria}${c._bote ? ' · ' + c._bote : ''}</div>
            </div>
          </div>
          <span style="font-size:15px;font-weight:800;flex-shrink:0;${isIngreso(c)?'color:#4ade80':'color:#f87171'}">
            ${isIngreso(c)?'+':'-'}S/ ${fmt(c.monto)}
          </span>
        </div>
      `).join('')}
      <div class="caja-total">
        <span style="color:var(--text-muted);">${allCaja.length} registros</span>
        <span style="font-weight:800;color:var(--gold);">S/ ${fmt(allCaja.reduce((s,c)=>s+(parseFloat(c.monto)||0),0))}</span>
      </div>
    </div>` : ''}

    <div style="text-align:center;padding:20px 0 8px;font-size:11px;color:var(--text-muted);">
      Generado por PS Panel · ${new Date().toLocaleString('es-PE')}
    </div>
  `;

  document.getElementById('root').innerHTML = html;
  startCountdown();
  buildCharts(data);
}

function buildCharts(data) {
  const ops = data.operaciones || [];
  const chartOpts = { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{ color:'#f0e6d3', font:{ size:10 }, boxWidth:10 } } } };
  const scaleOpts = { ticks:{ color:'#8a7060', font:{ size:10 } }, grid:{ color:'rgba(255,255,255,0.04)' } };

  const tipoMap = {};
  ops.forEach(op => Object.entries(op.tipo_chips||{}).forEach(([t,v]) => { tipoMap[t] = (tipoMap[t]||0)+v; }));
  const tipoKeys = Object.keys(tipoMap).filter(k => tipoMap[k] > 0);
  if (tipoKeys.length && document.getElementById('chartDonut')) {
    charts.donut = new Chart(document.getElementById('chartDonut'), {
      type: 'doughnut',
      data: { labels: tipoKeys, datasets: [{ data: tipoKeys.map(k=>tipoMap[k]), backgroundColor: tipoKeys.map(k=>getColor(k)), borderWidth:0 }] },
      options: { ...chartOpts, cutout:'60%' }
    });
  }

  if (ops.length && document.getElementById('chartBotes')) {
    const labels = ops.map(o => o.nombre_bote || o.id_bote);
    charts.botes = new Chart(document.getElementById('chartBotes'), {
      type: 'bar',
      data: { labels, datasets: [{ label:'Ingreso', data: ops.map(o=>o.ingresos_operador), backgroundColor:'rgba(201,168,76,0.6)', borderRadius:4 }] },
      options: { ...chartOpts, plugins:{ legend:{ display:false } }, scales:{ x:{ ...scaleOpts, grid:{ display:false } }, y:{ ...scaleOpts, ticks:{ ...scaleOpts.ticks, callback: v=>'S/'+v } } } }
    });
  }

  if (ops.length && document.getElementById('chartStack')) {
    const labels = ops.map(o => o.nombre_bote || o.id_bote);
    charts.stack = new Chart(document.getElementById('chartStack'), {
      type: 'bar',
      data: { labels, datasets: [
        { label:'Ingreso', data: ops.map(o=>o.ingresos_operador), backgroundColor:'rgba(74,222,128,0.6)', borderRadius:4 },
        { label:'Deuda',   data: ops.map(o=>o.deuda_comisionados), backgroundColor:'rgba(248,113,113,0.6)', borderRadius:4 }
      ]},
      options: { ...chartOpts, scales:{ x:{ ...scaleOpts, stacked:true, grid:{ display:false } }, y:{ ...scaleOpts, stacked:true, ticks:{ ...scaleOpts.ticks, callback: v=>'S/'+v } } } }
    });
  }
}

function renderError(msg) {
  document.getElementById('root').innerHTML = `
    <div style="text-align:center;padding:80px 20px;color:var(--text-muted);">
      <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
      <p style="font-size:15px;">${msg}</p>
      <button onclick="loadData()" style="margin-top:20px;padding:10px 24px;background:rgba(123,32,48,0.3);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;font-size:14px;">
        Reintentar
      </button>
    </div>`;
}

if (!API_URL) {
  renderError('No se encontró la URL del servidor. Abre el reporte desde el panel PS.');
} else {
  loadData();
}
</script>
</body>
</html>
