<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reporte Lanchas · PS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root {
  --guinda:#7B2030; --guinda-dark:#5a1722; --guinda-light:#9d2a3e;
  --gold:#C9A84C; --gold-light:#e8c46a; --gold-pale:#f5e9c8;
  --bg:#0e0608; --bg2:#160b0d; --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07); --border:rgba(201,168,76,0.18);
  --text:#f0e6d3; --text-muted:rgba(240,230,211,0.5);
  --radius:14px; --radius-sm:10px;
  --green:#4ade80; --red:#f87171; --amber:#fbbf24; --blue:#60a5fa; --purple:#c084fc;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:14px;}

/* ── Shimmer ── */
.shimmer{background:linear-gradient(90deg,var(--gold-dark,#a88835),var(--gold-light),var(--gold),var(--gold-light),var(--gold-dark,#a88835));background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite;}
@keyframes shimmer{to{background-position:200% center;}}
.glass{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}

/* ── Header ── */
.rpt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;}
.rpt-logo{font-size:26px;font-weight:900;letter-spacing:-1px;}
.rpt-meta{text-align:right;}
.rpt-fecha{font-size:15px;font-weight:700;}
.rpt-refresh{font-size:11px;color:var(--text-muted);margin-top:2px;}
.countdown{color:var(--gold);font-weight:700;}

/* ── Botones ── */
.btn-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.btn{padding:9px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);display:flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-wa{background:rgba(37,211,102,0.15);color:#25d366;border-color:rgba(37,211,102,0.3);}
.btn-print{background:var(--surface);color:var(--text-muted);}

/* ── Alertas ── */
.alerta-box{border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;display:flex;flex-direction:column;gap:8px;border:1px solid rgba(248,113,113,0.35);background:rgba(248,113,113,0.07);}
.alerta-item{display:flex;align-items:center;gap:10px;font-size:13px;}
.alerta-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.alerta-verde{border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.06);}

/* ── Las 4 preguntas ── */
.q4-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.q4-card{padding:14px;border-radius:var(--radius);}
.q4-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;opacity:.7;}
.q4-val{font-size:26px;font-weight:900;line-height:1;}
.q4-unit{font-size:11px;font-weight:700;margin-left:3px;opacity:.7;}
.q4-sub{font-size:10px;margin-top:5px;opacity:.65;line-height:1.4;}
.q4-debo-pases{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);}
.q4-me-deben-pases{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);}
.q4-debo-plata{background:rgba(251,191,36,0.09);border:1px solid rgba(251,191,36,0.3);}
.q4-me-deben-plata{background:rgba(96,165,250,0.09);border:1px solid rgba(96,165,250,0.3);}

/* ── KPI strip ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px;}
.kpi-card{padding:12px 14px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;}
.kpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:4px;}
.kpi-value{font-size:20px;font-weight:800;}
.kpi-sub{font-size:10px;color:var(--text-muted);margin-top:2px;}

/* ── Flujo de Valor ── */
.flujo-section{padding:14px 16px;margin-bottom:14px;}
.flujo-title{font-size:10px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.flujo-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.flujo-label{font-size:10px;color:var(--text-muted);width:110px;flex-shrink:0;text-align:right;line-height:1.3;}
.flujo-track{flex:1;height:10px;background:rgba(255,255,255,0.05);border-radius:5px;overflow:hidden;}
.flujo-bar{height:100%;border-radius:5px;min-width:2px;}
.flujo-val{font-size:11px;font-weight:800;width:80px;flex-shrink:0;text-align:right;}
.flujo-sep{border:none;border-top:1px dashed rgba(201,168,76,0.2);margin:6px 0 6px 118px;}

/* ── Gráficos ── */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:14px;}
.chart-card{padding:14px;}
.chart-title{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.chart-wrap{position:relative;height:170px;}

/* ── Section ── */
.section{margin-bottom:14px;}
.sec-hdr{font-size:10px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(201,168,76,0.2);}

/* ── Aliado balance ── */
.aliado-card{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden;background:var(--surface);}
.aliado-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;gap:8px;}
.aliado-nombre{font-size:13px;font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.aliado-badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;flex-shrink:0;}
.badge-debes{background:rgba(248,113,113,0.18);color:var(--red);border:1px solid rgba(248,113,113,0.3);}
.badge-te-deben{background:rgba(74,222,128,0.15);color:var(--green);border:1px solid rgba(74,222,128,0.3);}
.badge-tablas{background:rgba(255,255,255,0.07);color:var(--text-muted);border:1px solid var(--border);}
.aliado-body{padding:10px 14px 12px;background:rgba(0,0,0,0.2);border-top:1px solid var(--border);display:none;}
.aliado-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;}
.aliado-row:last-child{border-bottom:none;}

/* ── Cobros pendientes ── */
.pend-table{width:100%;font-size:11px;border-collapse:collapse;}
.pend-table th{padding:6px 8px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);text-align:left;border-bottom:1px solid var(--border);}
.pend-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
.pend-table tr:last-child td{border-bottom:none;}
.pend-table tr:hover td{background:var(--surface2);}

/* ── Progress bar inline ── */
.prog-wrap{background:rgba(255,255,255,0.06);border-radius:3px;height:4px;overflow:hidden;margin-top:3px;}
.prog-bar{height:100%;border-radius:3px;}

/* ── Op cards ── */
.op-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;background:var(--surface);}
.op-card.op-viaje{border-color:rgba(251,191,36,0.4);}
.op-card.op-cerrada{border-color:rgba(74,222,128,0.25);}
.op-card.op-cancelada{border-color:rgba(100,100,100,0.2);opacity:.6;}
.op-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px;}
.op-nombre{font-size:14px;font-weight:800;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.occ-bar-wrap{height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;margin-top:5px;}
.occ-bar{height:100%;border-radius:3px;}
.type-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.type-chip{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;}

/* ── Manifiesto ── */
.mov-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);}
.mov-row:last-child{border-bottom:none;}
.mov-row.mov-cancelado{opacity:.4;text-decoration:line-through;}
.mov-total{display:flex;justify-content:space-between;padding:8px 10px;border-top:1px solid var(--border);margin-top:2px;font-size:12px;font-weight:800;}

/* ── Badges tipo ── */
.tipo-badge{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;}
.tipo-Directo{background:rgba(74,222,128,0.12);color:var(--green);}
.tipo-Agencia{background:rgba(96,165,250,0.12);color:var(--blue);}
.tipo-Comisionado{background:rgba(251,191,36,0.12);color:var(--amber);}
.tipo-AliadoPaseIn{background:rgba(96,165,250,0.12);color:var(--blue);}
.tipo-AliadoPaseOut{background:rgba(240,171,252,0.12);color:var(--purple);}
.tipo-Aliado{background:rgba(240,171,252,0.12);color:var(--purple);}
.tipo-PaseRecibido{background:rgba(251,146,60,0.12);color:#fb923c;}

/* ── Caja ── */
.caja-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border-radius:8px;margin-bottom:4px;}
.caja-ingreso{background:rgba(74,222,128,0.06);border-left:3px solid rgba(74,222,128,0.4);}
.caja-salida{background:rgba(239,68,68,0.06);border-left:3px solid rgba(239,68,68,0.35);}

/* ── Matrix ── */
.mx-table{width:100%;font-size:11px;border-collapse:collapse;}
.mx-table th{color:var(--gold);font-weight:700;padding:5px 8px;text-align:right;border-bottom:1px solid var(--border);}
.mx-table th:first-child{text-align:left;}
.mx-table td{padding:5px 8px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text-muted);}
.mx-table td:first-child{text-align:left;}
.mx-table td.v{color:var(--text);font-weight:700;}
.mx-table tfoot td{border-top:1px solid var(--border);color:var(--gold);font-weight:800;}

/* ── Spinner ── */
.loading{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:14px;}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Mobile ── */
@media(max-width:600px){
  body{padding:10px;}
  .q4-grid{grid-template-columns:1fr 1fr;}
  .q4-val{font-size:22px;}
  .charts-grid{grid-template-columns:1fr;}
  .chart-wrap{height:150px;}
  .flujo-label{width:88px;font-size:9px;}
  .flujo-val{width:70px;font-size:10px;}
  .flujo-sep{margin-left:96px;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
}
/* ── Print ── */
@media print{
  body{background:#fff;color:#000;padding:10px;}
  .btn-bar,.no-print{display:none!important;}
  .glass,.op-card,.aliado-card,.chart-card,.flujo-section{background:#f9f9f9!important;border-color:#ddd!important;}
  .shimmer{-webkit-text-fill-color:var(--guinda)!important;background:none!important;animation:none!important;}
  .q4-val,.kpi-value,.op-nombre,.aliado-nombre{color:#000!important;}
  .sec-hdr,.kpi-label,.chart-title,.q4-label,.flujo-title{color:#555!important;}
  .charts-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div id="root">
  <div class="loading"><div class="spin"></div><p style="color:var(--text-muted);font-size:13px;">Cargando reporte…</p></div>
</div>

<script>
const params  = new URLSearchParams(location.search);
const fecha   = params.get('fecha') || new Date().toISOString().slice(0,10);
const PS_GAS  = 'https://script.google.com/macros/s/AKfycby7_H2lEOweA4cpixzNUw_50EfuQtiSoIW2389U5Ipyic3GRmETSRgBYSpIAaMcARcMhA/exec';
const API_URL = params.get('api') || localStorage.getItem('ps_api_url') || PS_GAS;

const REFRESH = 60;
const TIPOS_SIN_COBRO = ['Aliado(PaseIn)','Pase_Recibido','Aliado'];
let countdown = REFRESH, timer = null, charts = {};

// ── Utils ──────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt   = v => (parseFloat(v)||0).toLocaleString('es-PE',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtD  = v => (parseFloat(v)||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const S     = v => 'S/ ' + fmtD(v);
const pct   = (a,b) => b > 0 ? Math.min(100,(a/b*100)) : 0;
const fw    = (v,max) => Math.min(100,Math.max(1.5,(v/(max||1))*100)).toFixed(1);

function fmtFecha(f) {
  const [y,m,d] = f.split('-');
  const M = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${d} ${M[parseInt(m)-1]} ${y}`;
}
function tipoBadgeClass(tipo) {
  const map = {'Aliado(PaseIn)':'AliadoPaseIn','Aliado(PaseOut)':'AliadoPaseOut','Pase_Recibido':'PaseRecibido'};
  return 'tipo-badge tipo-' + (map[tipo] || String(tipo||'').replace(/[^a-zA-Z0-9]/g,''));
}
function contactColor(tipo) {
  const t = String(tipo||'').toLowerCase();
  if (t.includes('agencia')) return 'var(--blue)';
  if (t.includes('comisionado')) return 'var(--amber)';
  if (t.includes('aliado')||t.includes('paseout')) return 'var(--purple)';
  if (t.includes('pase')) return '#fb923c';
  return 'var(--green)';
}
function metIcon(m) {
  const k = String(m||'').toLowerCase();
  return k.includes('yape')?'📱':k.includes('plin')?'📲':k.includes('trans')?'🏦':k.includes('tarj')?'💳':'💵';
}
function isIngreso(c) {
  const cat = String(c.categoria||'').toLowerCase();
  return cat.includes('cobro')||cat.includes('ingreso')||cat.includes('venta');
}
function montoPayColor(op, mov) {
  const paid = (op.caja||[]).filter(c=>String(c.id_movimiento||'')===String(mov.id_mov||'')).reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
  const total = parseFloat(mov.monto_total)||0;
  if (!total) return 'color:var(--text-muted)';
  return paid >= total*0.99 ? 'color:var(--green)' : paid > 0 ? 'color:var(--amber)' : 'color:var(--red)';
}
function pagadoMov(allCaja, movId) {
  return allCaja.filter(c=>String(c.id_movimiento||'')===String(movId||'')).reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
}

// ── Fetch ──────────────────────────────────────────────────────
async function loadData() {
  try {
    const url = new URL(API_URL);
    url.searchParams.set('accion','lanchas_dia');
    url.searchParams.set('fecha', fecha);
    const r = await fetch(url.toString(), { cache:'no-store' });
    const json = await r.json();
    if (json.ok) render(json.data);
    else renderError('Error del servidor: ' + json.error);
  } catch(e) { renderError('Sin conexión: ' + e.message); }
}

function startCountdown() {
  clearInterval(timer);
  countdown = REFRESH;
  timer = setInterval(() => {
    countdown--;
    const el = $('countdown');
    if (el) el.textContent = '0:' + String(countdown).padStart(2,'0');
    if (countdown <= 0) { loadData(); countdown = REFRESH; }
  }, 1000);
}

function whatsappShare() {
  const msg = encodeURIComponent(`📊 Reporte Lanchas ${fmtFecha(fecha)}\n${location.href}`);
  window.open('https://wa.me/?text=' + msg, '_blank');
}

// ── Render principal ───────────────────────────────────────────
function render(data) {
  const ops        = data.operaciones   || [];
  const pasesSuelt = data.pases_sueltos || [];
  const cajaSuelta = data.caja_suelta   || [];
  const kpis       = data.kpis          || {};

  // ── Colecciones globales ──
  const allMovs = [];
  ops.forEach(op => (op.movimientos||[]).forEach(m => allMovs.push({ ...m, _op: op })));
  pasesSuelt.forEach(m => allMovs.push({ ...m, _op: null }));

  const allCaja = [];
  ops.forEach(op => (op.caja||[]).forEach(c => allCaja.push({ ...c, _bote: op.nombre_bote||op.id_bote })));
  cajaSuelta.forEach(c => allCaja.push({ ...c, _bote: '' }));

  // ── CÁLCULO: cobros pendientes (plata que me deben) ──────────
  const cobrosMap = {};  // id_mov → { nombre, tipo, bote, total, pagado, pendiente }
  allMovs.forEach(m => {
    if (m.estado === 'Cancelado') return;
    if (TIPOS_SIN_COBRO.includes(m.tipo)) return;
    const total   = parseFloat(m.monto_total) || 0;
    if (!total) return;
    const pagado  = pagadoMov(allCaja, m.id_mov);
    const pendiente = Math.max(0, total - pagado);
    if (pendiente > 0.01) {
      cobrosMap[m.id_mov] = {
        id_mov: m.id_mov, nombre: m.nombre_contacto, tipo: m.tipo,
        bote: m._op ? (m._op.nombre_bote||m._op.id_bote) : '—',
        total, pagado, pendiente
      };
    }
  });
  const cobrosArr = Object.values(cobrosMap).sort((a,b) => b.pendiente - a.pendiente);
  const totalPendCobrar = cobrosArr.reduce((s,c) => s + c.pendiente, 0);

  // ── CÁLCULO: pases enviados vs recibidos (balance aliados) ───
  const aliadoMap = {}; // nombre_aliado → { out, in, outItems, inItems, pendCompra }
  function getAliado(nombre) {
    if (!aliadoMap[nombre]) aliadoMap[nombre] = { out:0, in:0, outItems:[], inItems:[], pendCompra:0 };
    return aliadoMap[nombre];
  }
  allMovs.forEach(m => {
    if (m.estado === 'Cancelado') return;
    // PaseOut: movimiento con Id_contactoPase set
    if (m.id_contacto_pase) {
      const aliado = m.nombre_contacto_pase || m.id_contacto_pase;
      const d = getAliado(aliado);
      d.out += parseInt(m.cant_pax) || 0;
      d.outItems.push({ pax: m.cant_pax, origen: m.nombre_contacto,
        cobrado: !!m.id_agencia_comprada, monto: parseFloat(m.monto_comprado)||0,
        montoOrig: parseFloat(m.monto_total)||0 });
      if (!m.id_agencia_comprada) d.pendCompra += parseFloat(m.monto_total) || 0;
    }
    // PaseIn: Aliado(PaseIn) o Pase_Recibido
    if (m.tipo === 'Aliado(PaseIn)' || m.tipo === 'Pase_Recibido') {
      const aliado = m.nombre_contacto || m.id_contacto;
      const d = getAliado(aliado);
      d.in += parseInt(m.cant_pax) || 0;
      d.inItems.push({ pax: m.cant_pax });
    }
  });
  const aliadoArr = Object.entries(aliadoMap).sort((a,b) => {
    const sA = a[1].in - a[1].out, sB = b[1].in - b[1].out;
    if (sA !== sB) return sA - sB; // negativos (debo) primero
    return a[0].localeCompare(b[0]);
  });
  const totalPaxOut  = aliadoArr.reduce((s,[,d])=>s+d.out, 0);
  const totalPaxIn   = aliadoArr.reduce((s,[,d])=>s+d.in,  0);
  const totalPendCompra = aliadoArr.reduce((s,[,d])=>s+d.pendCompra, 0);

  // ── CÁLCULO: comisionados (plata que debo) ───────────────────
  const comMap = {}; // nombre → { pax, cobrado, comision, pagado }
  allMovs.forEach(m => {
    if (m.tipo !== 'Comisionado' || m.estado === 'Cancelado') return;
    const key   = m.nombre_contacto || m.id_contacto;
    const pax   = parseInt(m.cant_pax) || 0;
    const precioApl  = parseFloat(m.precio_aplicado) || 0;
    const precioDef  = parseFloat(m.precio_defecto)  || 0;
    const cobrado    = parseFloat(m.monto_total) || 0;
    const margen     = precioDef * pax;
    const comision   = Math.max(0, (precioApl * pax) - margen);
    if (!comMap[key]) comMap[key] = { pax:0, cobrado:0, comision:0, pagado:0 };
    comMap[key].pax      += pax;
    comMap[key].cobrado  += cobrado;
    comMap[key].comision += comision;
  });
  // Cruzar pagos de comisionados desde caja (categoria='Pagos' o 'Pago_Comisionado')
  allCaja.forEach(c => {
    if (!String(c.categoria||'').toLowerCase().includes('pago')) return;
    const key = c.id_contacto ? c.id_contacto : null;
    if (!key || !comMap[key]) return;

  const comHtml = comArr.length > 0 ? `

      <thead>
        <tr>
          <th style="text-align:left;">Tipo</th>
          <th>🛥 Embarcado</th>
          <th>✕ Cancelado</th>
          <th>🔀 Pasado</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        ${Object.entries(paxMatrix).sort((a,b)=>a[0].localeCompare(b[0])).map(([tipo,v]) => {
          const tot = v.emb+v.can+v.pas;
          return `<tr>
            <td><span class="${tipoBadgeClass(tipo)}">${tipo}</span></td>
            <td class="${v.emb>0?'v':''}">${v.emb>0?v.emb:'—'}</td>
            <td class="${v.can>0?'v':''}" style="${v.can>0?'color:var(--red);':''}">${v.can>0?v.can:'—'}</td>
            <td class="${v.pas>0?'v':''}" style="${v.pas>0?'color:var(--amber);':''}">${v.pas>0?v.pas:'—'}</td>
            <td style="color:var(--gold)">${tot}</td>
          </tr>`;
        }).join('')}
      </tbody>
      <tfoot>
        <tr>
          <td>Total</td>
          <td>${Object.values(paxMatrix).reduce((s,v)=>s+v.emb,0)||'—'}</td>
          <td style="color:var(--red);">${Object.values(paxMatrix).reduce((s,v)=>s+v.can,0)||'—'}</td>
          <td style="color:var(--amber);">${Object.values(paxMatrix).reduce((s,v)=>s+v.pas,0)||'—'}</td>
          <td>${Object.values(paxMatrix).reduce((s,v)=>s+v.emb+v.can+v.pas,0)}</td>
        </tr>
      </tfoot>
    </table>
    </div>
  </div>` : '';

  // ── Caja historial ────────────────────────────────────────────
  const ingTotal = allCaja.filter(c=>isIngreso(c)).reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
  const salTotal = allCaja.filter(c=>!isIngreso(c)).reduce((s,c)=>s+(parseFloat(c.monto)||0),0);
  const cajaHtml = allCaja.length > 0 ? `
  <div class="glass" style="padding:0;overflow:hidden;margin-bottom:14px;">
    <div style="background:linear-gradient(135deg,var(--guinda-dark,#5a1722),var(--guinda,#7B2030));padding:14px 16px;color:var(--text);">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.6;margin-bottom:4px;">Balance del día · ${allCaja.length} registros</div>
      <div style="font-size:26px;font-weight:900;">${S(ingTotal - salTotal)}</div>
      <div style="font-size:11px;opacity:.75;margin-top:4px;display:flex;justify-content:space-between;">
        <span>↑ ${S(ingTotal)} ingresos</span>
        <span>↓ ${S(salTotal)} salidas</span>
      </div>
    </div>
    <div>
    ${allCaja.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(c => {
      const ing = isIngreso(c);
      const hora = c.timestamp ? new Date(c.timestamp).toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'}) : '—';
      const cat  = String(c.categoria||'').replace(/_/g,' ');
      return `<div class="caja-row ${ing?'caja-ingreso':'caja-salida'}">
        <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
          <span style="font-size:20px;flex-shrink:0;">${metIcon(c.metodo_pago)}</span>
          <div style="min-width:0;">
            <div style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.operador||cat}
              ${c._bote?`<span style="font-size:10px;color:var(--text-muted);"> · ⛵ ${c._bote}</span>`:''}
            </div>
            <div style="font-size:10px;color:var(--text-muted);">${hora} · ${cat}</div>
          </div>
        </div>
        <span style="font-size:14px;font-weight:800;flex-shrink:0;${ing?'color:var(--green)':'color:var(--red)'};">${ing?'+':'-'}${S(c.monto)}</span>
      </div>`;
    }).join('')}
    </div>
  </div>` : '';

  // ── Ensamblar todo ────────────────────────────────────────────
  $('root').innerHTML = `
  <div class="rpt-header">
    <div>
      <div class="rpt-logo shimmer">PS</div>
      <div style="font-size:11px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;">Reporte de Lanchas</div>
    </div>
    <div class="rpt-meta">
      <div class="rpt-fecha">📅 ${fmtFecha(fecha)}</div>
      <div class="rpt-refresh">Actualiza en <span class="countdown" id="countdown">1:00</span></div>
    </div>
  </div>

  <div class="btn-bar no-print">
    <button class="btn btn-wa" onclick="whatsappShare()">💬 WhatsApp</button>
    <button class="btn btn-print" onclick="window.print()">🖨 Imprimir</button>
  </div>

  ${alertaHtml}

  <div class="section">
    <div class="sec-hdr">❓ Las 4 preguntas del turno</div>
    ${q4Html}
  </div>

  ${kpiHtml}
  ${flujoHtml}

  <div class="charts-grid">
    <div class="chart-card glass">
      <div class="chart-title">PAX por tipo</div>
      <div class="chart-wrap"><canvas id="chartTipo"></canvas></div>
    </div>
    <div class="chart-card glass">
      <div class="chart-title">Ingresos por método</div>
      <div class="chart-wrap"><canvas id="chartMetodo"></canvas></div>
    </div>
    <div class="chart-card glass">
      <div class="chart-title">Ocupación por bote</div>
      <div class="chart-wrap"><canvas id="chartOcupacion"></canvas></div>
    </div>
    ${aliadoArr.length > 1 ? `
    <div class="chart-card glass">
      <div class="chart-title">Balance de pases por aliado</div>
      <div class="chart-wrap"><canvas id="chartAliados"></canvas></div>
    </div>` : ''}
  </div>

  ${aliadoArr.length > 0 ? `
  <div class="section glass" style="padding:14px;margin-bottom:14px;">
    <div class="sec-hdr">🤝 Balance de Aliados — pases out vs in</div>
    ${aliadoHtml}
  </div>` : ''}

  ${cobrosArr.length > 0 ? `
  <div class="section glass" style="padding:14px;margin-bottom:14px;">
    <div class="sec-hdr">💰 Cobros pendientes (${cobrosArr.length})</div>
    ${cobrosHtml}
  </div>` : ''}

  ${comArr.length > 0 || kpis.deuda_comisionados > 0 ? `
  <div class="section glass" style="padding:14px;margin-bottom:14px;">
    <div class="sec-hdr">👥 Comisionados</div>
    ${comHtml}
  </div>` : ''}

  <div class="section glass" style="padding:14px;margin-bottom:14px;">
    <div class="sec-hdr">⛵ Operaciones del día (${ops.length})</div>
    ${opCardsHtml}
  </div>

  ${manifHtml ? `<div class="section">
    <div class="sec-hdr" style="margin-bottom:10px;">📋 Manifiestos</div>
    ${manifHtml}
  </div>` : ''}

  ${matrixHtml}

  <div class="section">
    <div class="sec-hdr" style="margin-bottom:10px;">📒 Caja del día</div>
    ${cajaHtml || '<div style="color:var(--text-muted);font-size:13px;padding:6px 0;">Sin movimientos de caja.</div>'}
  </div>

  <div style="text-align:center;padding:20px 0 8px;font-size:11px;color:var(--text-muted);">
    Generado por PS Panel · ${new Date().toLocaleString('es-PE')}
  </div>`;

  startCountdown();
  buildCharts(data, tipoIngMap, metMap);
}

// ── Charts ──────────────────────────────────────────────────────
function buildCharts(data, tipoIngMap, metMap) {
  const ops    = data.operaciones || [];
  const copts  = { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{ color:'#f0e6d3', font:{ size:10 }, boxWidth:10 } } } };
  const scOpts = { ticks:{ color:'#8a7060', font:{ size:10 } }, grid:{ color:'rgba(255,255,255,0.04)' } };

  const colors = ['#4ade80','#60a5fa','#fbbf24','#f0abfc','#fb923c','#a78bfa','#34d399','#f87171'];

  // Donut: PAX por tipo
  const tipoKeys = Object.keys(tipoIngMap).filter(k => tipoIngMap[k] > 0);
  if (tipoKeys.length && $('chartTipo')) {
    charts.tipo = new Chart($('chartTipo'), {
      type:'doughnut',
      data:{ labels:tipoKeys, datasets:[{ data:tipoKeys.map(k=>tipoIngMap[k]), backgroundColor:tipoKeys.map((_,i)=>colors[i%colors.length]), borderWidth:0 }] },
      options:{ ...copts, cutout:'60%' }
    });
  }

  // Donut: ingresos por método
  const metKeys = Object.keys(metMap).filter(k=>metMap[k].ing>0);
  if (metKeys.length && $('chartMetodo')) {
    charts.metodo = new Chart($('chartMetodo'), {
      type:'doughnut',
      data:{ labels:metKeys, datasets:[{ data:metKeys.map(k=>metMap[k].ing), backgroundColor:metKeys.map((_,i)=>colors[i%colors.length]), borderWidth:0 }] },
      options:{ ...copts, cutout:'60%' }
    });
  }

  // Barras horizontales: ocupación por bote
  if (ops.length && $('chartOcupacion')) {
    const labels = ops.map(o=>o.nombre_bote||o.id_bote);
    charts.ocup = new Chart($('chartOcupacion'), {
      type:'bar',
      data:{ labels, datasets:[
        { label:'Ocupados', data:ops.map(o=>o.pax_total), backgroundColor:'rgba(201,168,76,0.7)', borderRadius:4 },
        { label:'Libre', data:ops.map(o=>Math.max(0,(o.capacidad||0)-o.pax_total)), backgroundColor:'rgba(255,255,255,0.06)', borderRadius:4 }
      ]},
      options:{ ...copts, indexAxis:'y', scales:{
        x:{ ...scOpts, stacked:true, grid:{ display:false } },
        y:{ ...scOpts, stacked:true }
      }, plugins:{ legend:{ labels:{ color:'#f0e6d3', font:{ size:10 }, boxWidth:10 } } } }
    });
  }

  // Barras apiladas: aliados (out vs in)
  if ($('chartAliados')) {
    const aliadoMap2 = {};
    (data.operaciones||[]).forEach(op=>(op.movimientos||[]).forEach(m=>{
      if (m.estado==='Cancelado') return;
      if (m.id_contacto_pase) {
        const k = m.nombre_contacto_pase||m.id_contacto_pase;
        if (!aliadoMap2[k]) aliadoMap2[k]={out:0,in:0};
        aliadoMap2[k].out += parseInt(m.cant_pax)||0;
      }
      if (m.tipo==='Aliado(PaseIn)'||m.tipo==='Pase_Recibido') {
        const k = m.nombre_contacto||m.id_contacto;
        if (!aliadoMap2[k]) aliadoMap2[k]={out:0,in:0};
        aliadoMap2[k].in += parseInt(m.cant_pax)||0;
      }
    }));
    const aKeys = Object.keys(aliadoMap2);
    if (aKeys.length) {
      charts.aliados = new Chart($('chartAliados'), {
        type:'bar',
        data:{ labels:aKeys, datasets:[
          { label:'Enviados ↑', data:aKeys.map(k=>aliadoMap2[k].out), backgroundColor:'rgba(248,113,113,0.65)', borderRadius:4 },
          { label:'Recibidos ↓', data:aKeys.map(k=>aliadoMap2[k].in), backgroundColor:'rgba(74,222,128,0.55)', borderRadius:4 }
        ]},
        options:{ ...copts, indexAxis:'y', scales:{
          x:{ ...scOpts, grid:{ color:'rgba(255,255,255,0.04)' } },
          y:{ ...scOpts }
        } }
      });
    }
  }
}

// ── Error ────────────────────────────────────────────────────────
function renderError(msg) {
  $('root').innerHTML = `
  <div style="text-align:center;padding:80px 20px;color:var(--text-muted);">
    <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
    <p style="font-size:14px;">${msg}</p>
    <button onclick="loadData()" style="margin-top:20px;padding:10px 24px;background:rgba(123,32,48,0.3);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;font-size:14px;">
      Reintentar
    </button>
  </div>`;
}

if (!API_URL) {
  renderError('No se encontró la URL del servidor. Abre el reporte desde el panel PS.');
} else {
  loadData();
}
</script>
</body>
</html>
